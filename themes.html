<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Themes</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; transition: background 0.35s; min-height: 100vh; }

  /* ── Header ── */
  #header {
    position: sticky; top: 0; z-index: 200;
    display: flex; align-items: center; gap: 14px;
    padding: 0 24px; height: 56px;
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    transition: background 0.35s, border-color 0.35s;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.45); text-decoration: none;
    transition: color 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .back-btn:hover { color: rgba(255,255,255,0.9); }
  .h-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
  .brand { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .brand-name { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.88); }
  .brand-slash { color: rgba(255,255,255,0.18); font-size: 12px; }
  .brand-sub { font-size: 12px; color: rgba(255,255,255,0.38); }
  .spacer { flex: 1; }

  /* Theme tabs */
  .theme-tabs {
    display: flex; gap: 3px; padding: 3px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
  }
  .theme-tab {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 14px; border-radius: 9px; border: 1px solid transparent;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    background: transparent; color: rgba(255,255,255,0.38);
    transition: all 0.22s ease;
  }
  .theme-tab:hover { color: rgba(255,255,255,0.7); }
  .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Variation pills */
  .var-pills {
    display: flex; gap: 2px; padding: 3px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
  }
  .var-pill {
    padding: 5px 11px; border-radius: 7px; border: none;
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    background: transparent; color: rgba(255,255,255,0.38);
    transition: all 0.22s ease;
  }
  .var-pill:hover { color: rgba(255,255,255,0.7); }

  /* Mode button */
  #modeBtn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 13px; border-radius: 999px; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
    transition: all 0.22s ease;
  }
  #modeBtn:hover { opacity: 0.85; }

  /* ── iPhone 17 Pro mockup ── */
  .iphone {
    width: 208px; height: 432px; border-radius: 46px;
    position: relative; flex-shrink: 0;
    /* Natural Titanium finish */
    background: linear-gradient(160deg,#48443f 0%,#1e1c1a 40%,#322e2b 100%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.16),
      0 0 0 2.5px #0e0d0c,
      0 0 0 4px rgba(255,255,255,0.07),
      0 28px 56px rgba(0,0,0,0.72),
      0 10px 22px rgba(0,0,0,0.48),
      inset 0 1px 0 rgba(255,255,255,0.22);
    transition: transform 0.3s;
  }
  .iphone:hover { transform: translateY(-5px) scale(1.02); }
  .iphone::before {
    content: ''; position: absolute; left: -3px; top: 92px;
    width: 3px; height: 32px;
    background: linear-gradient(180deg,#48443f,#2e2b28);
    border-radius: 2px 0 0 2px;
    box-shadow: 0 40px 0 #38342f, 0 72px 0 #38342f, -1px 0 0 rgba(255,255,255,0.1);
  }
  .iphone::after {
    content: ''; position: absolute; right: -3px; top: 130px;
    width: 3px; height: 58px;
    background: linear-gradient(180deg,#48443f,#2e2b28);
    border-radius: 0 2px 2px 0;
    box-shadow: -1px 0 0 rgba(0,0,0,0.4);
  }
  .iphone-glass {
    position: absolute; inset: 4px; border-radius: 42px;
    overflow: hidden; background: #000;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.14);
  }
  .iphone-screen {
    position: absolute; top: 10px; left: 7px;
    width: 187px; height: 405px; border-radius: 38px;
    overflow: hidden; background: #000;
  }
  .iphone-screen iframe {
    width: 390px; height: 844px; border: none; display: block;
    pointer-events: none;
    transform: scale(0.48); transform-origin: top left;
  }
  .dynamic-island {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    width: 62px; height: 12px; background: #000; border-radius: 9px;
    z-index: 10; box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
  }
  .home-bar {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 3px; background: rgba(255,255,255,0.35);
    border-radius: 3px; z-index: 10;
  }

</style>
</head>
<body id="body">

<!-- ═══════════ HEADER ═══════════ -->
<header id="header">
  <a href="index.html" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 12L6 8l4-4"/></svg>
    Back to Pitch
  </a>
  <div class="h-sep"></div>
  <div class="brand">
    <span style="font-size:17px;line-height:1;">🐝</span>
    <span class="brand-name">Spell Bee</span>
    <span class="brand-slash">/</span>
    <span class="brand-sub">Interactive Prototype</span>
  </div>
  <div class="spacer"></div>
  <div class="theme-tabs">
    <button class="theme-tab" id="tab-spellbee" onclick="setTheme('spellbee')">
      <span class="tab-dot" style="background:#C8001E;"></span>
      SpellBee Show
    </button>
    <button class="theme-tab" id="tab-earth" onclick="setTheme('earth')">
      <span class="tab-dot" style="background:#FF9A00;"></span>
      Warm Earth
    </button>
  </div>
  <div class="h-sep"></div>
  <div class="var-pills">
    <button class="var-pill" id="pill-base" onclick="setVariation('base')">Base</button>
    <button class="var-pill" id="pill-gamified" onclick="setVariation('gamified')">⚡ Gamified</button>
    <button class="var-pill" id="pill-clear" onclick="setVariation('clear')">🎨 Illustrated</button>
  </div>
  <div class="h-sep"></div>
  <button id="modeBtn" onclick="toggleMode()">
    <span id="modeIcon">🌙</span>
    <span id="modeLabel">Dark</span>
  </button>
</header>

<!-- ═══════════ SCREENS ═══════════ -->
<div id="pageBody" style="min-height:calc(100vh - 53px); padding: 40px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:36px;">

  <!-- Phones row -->
  <div style="display:flex; align-items:flex-end; justify-content:center; gap:32px; flex-wrap:wrap;">

    <!-- Home -->
    <div id="screen-home" class="flex flex-col items-center gap-3">
      <div class="iphone">
        <div class="iphone-glass">
          <div class="iphone-screen">
            <iframe id="iframe-home" src="screens/original/02-home.html" scrolling="no"></iframe>
          </div>
        </div>
        <div class="dynamic-island"></div>
        <div class="home-bar"></div>
      </div>
      <span id="label-home" style="font-size:12px;font-weight:600;letter-spacing:0.5px;opacity:0.5;">Home</span>
    </div>

    <!-- Spelling Test -->
    <div id="screen-test" class="flex flex-col items-center gap-3">
      <div class="iphone">
        <div class="iphone-glass">
          <div class="iphone-screen">
            <iframe id="iframe-test" src="screens/original/04-spelling-test.html" scrolling="no"></iframe>
          </div>
        </div>
        <div class="dynamic-island"></div>
        <div class="home-bar"></div>
      </div>
      <span id="label-test" style="font-size:12px;font-weight:600;letter-spacing:0.5px;opacity:0.5;">Spelling Test</span>
    </div>

    <!-- Leaderboard -->
    <div id="screen-leader" class="flex flex-col items-center gap-3">
      <div class="iphone">
        <div class="iphone-glass">
          <div class="iphone-screen">
            <iframe id="iframe-leader" src="screens/original/07-leaderboard.html" scrolling="no"></iframe>
          </div>
        </div>
        <div class="dynamic-island"></div>
        <div class="home-bar"></div>
      </div>
      <span id="label-leader" style="font-size:12px;font-weight:600;letter-spacing:0.5px;opacity:0.5;">Leaderboard</span>
    </div>

  </div>


</div>


<!-- ═══════════ THEME ENGINE ═══════════ -->
<script>
  // ── Token definitions ──────────────────────────────
  const THEMES = {
    spellbee: {
      name: 'SpellBee Show',
      font: 'font-spellbee',
      dark: {
        bodyBg:       '#1A1A2E',
        barBg:        '#1A1A2E',
        barBorder:    'rgba(255,255,255,0.08)',
        barShadow:    '0 1px 12px rgba(0,0,0,0.4)',
        // active button
        activeBg:     '#C8001E',
        activeBorder: '#C8001E',
        activeText:   '#ffffff',
        activeDot:    '#ffffff',
        // inactive button
        idleBg:       'rgba(255,255,255,0.06)',
        idleBorder:   'rgba(255,255,255,0.12)',
        idleText:     'rgba(255,255,255,0.65)',
        idleDot:      'transparent',
        // mode toggle
        modeBg:       '#F5A500',
        modeBorder:   '#F5A500',
        modeText:     '#1A1A2E',
      },
      light: {
        bodyBg:       '#F7F0E6',
        barBg:        '#F7F0E6',
        barBorder:    'rgba(26,26,46,0.1)',
        barShadow:    '0 1px 12px rgba(0,0,0,0.08)',
        activeBg:     '#C8001E',
        activeBorder: '#C8001E',
        activeText:   '#ffffff',
        activeDot:    '#ffffff',
        idleBg:       'rgba(26,26,46,0.06)',
        idleBorder:   'rgba(26,26,46,0.14)',
        idleText:     'rgba(26,26,46,0.6)',
        idleDot:      'transparent',
        modeBg:       '#1A1A2E',
        modeBorder:   '#1A1A2E',
        modeText:     '#F5A500',
      }
    },

    earth: {
      name: 'Warm Earth',
      font: 'font-earth',
      dark: {
        bodyBg:       '#1C100A',
        barBg:        '#1C100A',
        barBorder:    'rgba(255,255,255,0.07)',
        barShadow:    '0 1px 12px rgba(0,0,0,0.5)',
        activeBg:     '#FF9A00',
        activeBorder: '#FF9A00',
        activeText:   '#ffffff',
        activeDot:    '#ffffff',
        idleBg:       'rgba(255,255,255,0.05)',
        idleBorder:   'rgba(255,255,255,0.1)',
        idleText:     'rgba(255,255,255,0.6)',
        idleDot:      'transparent',
        modeBg:       '#FFD93D',
        modeBorder:   '#FFD93D',
        modeText:     '#4F200D',
      },
      light: {
        bodyBg:       '#F6F1E9',
        barBg:        '#F6F1E9',
        barBorder:    'rgba(79,32,13,0.1)',
        barShadow:    '0 1px 12px rgba(0,0,0,0.06)',
        activeBg:     '#FF9A00',
        activeBorder: '#FF9A00',
        activeText:   '#ffffff',
        activeDot:    '#ffffff',
        idleBg:       'rgba(79,32,13,0.06)',
        idleBorder:   'rgba(79,32,13,0.14)',
        idleText:     'rgba(79,32,13,0.6)',
        idleDot:      'transparent',
        modeBg:       '#4F200D',
        modeBorder:   '#4F200D',
        modeText:     '#FFD93D',
      }
    }
  };

  // ── Variation labels ──────────────────────────────
  const VARIATIONS = {
    base:     { label: 'Base',             desc: 'Default balanced design' },
    gamified: { label: '⚡ Heavy Gamified', desc: 'XP, badges, streaks front and centre' },
    clear:    { label: '🎨 Illustrated',      desc: 'Illustrated, storybook-style design' },
  };

  // ── Variation → screen directory & available files ──
  const SCREEN_DIRS = {
    base:     'screens/original',
    gamified: 'screens/v2',
    clear:    'screens/v3',
  };

  const SCREEN_CONFIG = [
    { file: '02-home.html',          wrapperId: 'screen-home',   iframeId: 'iframe-home',   inVariations: ['base', 'gamified', 'clear'] },
    { file: '04-spelling-test.html', wrapperId: 'screen-test',   iframeId: 'iframe-test',   inVariations: ['base'] },
    { file: '07-leaderboard.html',   wrapperId: 'screen-leader', iframeId: 'iframe-leader', inVariations: ['base', 'gamified', 'clear'] },
  ];

  function updateScreens() {
    const dir = SCREEN_DIRS[activeVariation];
    SCREEN_CONFIG.forEach(({ file, wrapperId, iframeId, inVariations }) => {
      const wrapper = document.getElementById(wrapperId);
      const iframe  = document.getElementById(iframeId);
      if (inVariations.includes(activeVariation)) {
        wrapper.style.display = '';
        iframe.src = `${dir}/${file}`;
      } else {
        wrapper.style.display = 'none';
      }
    });
  }

  // ── State ──────────────────────────────────────────
  let activeTheme     = 'spellbee';
  let activeVariation = 'base';
  let isDark          = true;

  // ── Apply ──────────────────────────────────────────
  function apply() {
    const t = THEMES[activeTheme];
    const c = isDark ? t.dark : t.light;

    // body
    document.getElementById('body').style.background = c.bodyBg;
    document.getElementById('pageBody').style.background = c.bodyBg;

    // topbar
    const bar = document.getElementById('topbar');
    bar.style.background   = c.barBg;
    bar.style.borderColor  = c.barBorder;
    bar.style.boxShadow    = c.barShadow;

    // header background
    const header = document.getElementById('header');
    header.style.background   = c.barBg + (isDark ? 'dd' : 'ee');
    header.style.borderBottom = `1px solid ${c.barBorder}`;

    // theme tabs
    const THEME_ACCENTS = { spellbee: '#C8001E', earth: '#FF9A00' };
    ['spellbee', 'earth'].forEach(id => {
      const tab = document.getElementById('tab-' + id);
      const isActive = id === activeTheme;
      tab.style.background  = isActive ? THEME_ACCENTS[id] : 'transparent';
      tab.style.borderColor = isActive ? THEME_ACCENTS[id] : 'transparent';
      tab.style.color       = isActive ? '#fff' : c.idleText;
      tab.style.boxShadow   = isActive ? `0 2px 10px ${THEME_ACCENTS[id]}55` : 'none';
    });

    // variation pills
    Object.keys(VARIATIONS).forEach(v => {
      const pill = document.getElementById('pill-' + v);
      const isActive = v === activeVariation;
      pill.style.background = isActive ? c.activeBg   : 'transparent';
      pill.style.color      = isActive ? c.activeText : c.idleText;
    });

    // mode button
    const modeBtn = document.getElementById('modeBtn');
    modeBtn.style.background = c.modeBg;
    modeBtn.style.color      = c.modeText;
    document.getElementById('modeIcon').textContent  = isDark ? '☀️' : '🌙';
    document.getElementById('modeLabel').textContent = isDark ? 'Light' : 'Dark';

    // screen labels
    ['label-home','label-test','label-leader'].forEach(id => {
      document.getElementById(id).style.color = c.idleText;
    });
  }

  function setTheme(id) {
    activeTheme = id;
    apply();
  }

  function setVariation(v) {
    activeVariation = v;
    updateScreens();
    apply();
  }

  function toggleMode() {
    isDark = !isDark;
    apply();
  }

  // boot
  updateScreens();
  apply();
</script>
</body>
</html>
