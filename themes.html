<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Themes</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { transition: background 0.35s, color 0.35s; min-height: 100vh; }

  /* ── SpellBee Show — font ── */
  .font-spellbee { font-family: 'Inter', sans-serif; }

  /* ── Warm Earth — font ── */
  .font-earth { font-family: 'Fredoka One', cursive; }

  /* ── Top bar transition ── */
  #topbar { transition: background 0.35s, border-color 0.35s, box-shadow 0.35s; }

  /* ── Theme button ── */
  .theme-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 16px; border-radius: 999px; border: 1.5px solid transparent;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.25s ease;
  }
  .theme-btn:hover { transform: translateY(-1px); }

  /* ── Mode toggle ── */
  #modeToggle {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 14px; border-radius: 999px; border: 1.5px solid transparent;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.25s ease;
  }
  #modeToggle:hover { transform: translateY(-1px); }

  /* ── Active theme dot ── */
  .active-dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }

  /* ── Bar section separator ── */
  .bar-sep {
    width: 1px; height: 18px; flex-shrink: 0;
    background: rgba(128,128,128,0.2);
  }

  /* ── Variation segmented control ── */
  #var-group {
    display: flex; align-items: center; gap: 2px;
    padding: 3px; border-radius: 10px; border: 1.5px solid transparent;
    transition: background 0.35s, border-color 0.35s;
  }

  .var-btn {
    padding: 5px 13px; border-radius: 7px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.22s ease; white-space: nowrap; background: transparent;
  }
  .var-btn:hover { opacity: 0.8; }

  /* ── iPhone 15 Pro mockup ── */
  .iphone {
    width: 180px; height: 370px; border-radius: 40px;
    position: relative; flex-shrink: 0;
    background: linear-gradient(160deg,#3a3a3c 0%,#1c1c1e 40%,#2c2c2e 100%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.14),
      0 0 0 2.5px #111113,
      0 0 0 4px rgba(255,255,255,0.08),
      0 24px 48px rgba(0,0,0,0.7),
      0 8px 18px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.18);
    transition: transform 0.3s;
  }
  .iphone:hover { transform: translateY(-4px) scale(1.02); }
  .iphone::before {
    content: ''; position: absolute; left: -3px; top: 80px;
    width: 3px; height: 28px;
    background: linear-gradient(180deg,#3a3a3c,#2a2a2c);
    border-radius: 2px 0 0 2px;
    box-shadow: 0 35px 0 #333335, 0 62px 0 #333335, -1px 0 0 rgba(255,255,255,0.1);
  }
  .iphone::after {
    content: ''; position: absolute; right: -3px; top: 112px;
    width: 3px; height: 50px;
    background: linear-gradient(180deg,#3a3a3c,#2a2a2c);
    border-radius: 0 2px 2px 0;
    box-shadow: -1px 0 0 rgba(0,0,0,0.4);
  }
  .iphone-glass {
    position: absolute; inset: 5px; border-radius: 36px;
    overflow: hidden; background: #000;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .iphone-screen {
    position: absolute; top: 10px; left: 7px;
    width: 156px; height: 338px; border-radius: 32px;
    overflow: hidden; background: #000;
  }
  .iphone-screen iframe {
    width: 390px; height: 844px; border: none; display: block;
    pointer-events: none;
    transform: scale(0.4); transform-origin: top left;
  }
  .dynamic-island {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    width: 54px; height: 11px; background: #000; border-radius: 8px;
    z-index: 10; box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
  }
  .home-bar {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 54px; height: 3px; background: rgba(255,255,255,0.35);
    border-radius: 3px; z-index: 10;
  }
</style>
</head>
<body id="body">

<!-- ═══════════ TOP BAR ═══════════ -->
<div id="topbar" class="sticky top-0 z-50 flex items-center gap-3 px-5 py-2.5 border-b">

  <!-- Brand -->
  <div class="flex items-center gap-2 flex-shrink-0">
    <span style="font-size:17px;line-height:1">🐝</span>
    <span id="brand-label" style="font-size:13px;font-weight:700;letter-spacing:-0.2px">Spell Bee</span>
  </div>

  <div class="bar-sep"></div>

  <!-- Theme buttons -->
  <div class="flex items-center gap-1.5">
    <button id="btn-spellbee" class="theme-btn" onclick="setTheme('spellbee')">
      <span class="active-dot" id="dot-spellbee"></span>
      SpellBee Show
    </button>
    <button id="btn-earth" class="theme-btn" onclick="setTheme('earth')">
      <span class="active-dot" id="dot-earth"></span>
      Warm Earth
    </button>
  </div>

  <!-- Spacer -->
  <div style="flex:1"></div>

  <!-- Variation segmented control -->
  <div id="var-group">
    <button id="btn-base" class="var-btn" onclick="setVariation('base')">Base</button>
    <button id="btn-gamified" class="var-btn" onclick="setVariation('gamified')">⚡ Gamified</button>
    <button id="btn-clear" class="var-btn" onclick="setVariation('clear')">🎨 Illustrated</button>
  </div>

  <div class="bar-sep"></div>

  <!-- Light / Dark toggle -->
  <button id="modeToggle" onclick="toggleMode()">
    <span id="modeIcon">🌙</span>
    <span id="modeLabel">Dark</span>
  </button>

</div>

<!-- ═══════════ SCREENS ═══════════ -->
<div id="pageBody" class="w-full flex items-center justify-center gap-10 flex-wrap" style="min-height:calc(100vh - 53px); padding: 48px 40px;">

  <!-- Home -->
  <div id="screen-home" class="flex flex-col items-center gap-3">
    <div class="iphone">
      <div class="iphone-glass">
        <div class="iphone-screen">
          <iframe id="iframe-home" src="screens/original/02-home.html" scrolling="no"></iframe>
        </div>
      </div>
      <div class="dynamic-island"></div>
      <div class="home-bar"></div>
    </div>
    <span id="label-home" style="font-size:12px;font-weight:600;letter-spacing:0.5px;opacity:0.5;">Home</span>
  </div>

  <!-- Spelling Test -->
  <div id="screen-test" class="flex flex-col items-center gap-3">
    <div class="iphone">
      <div class="iphone-glass">
        <div class="iphone-screen">
          <iframe id="iframe-test" src="screens/original/04-spelling-test.html" scrolling="no"></iframe>
        </div>
      </div>
      <div class="dynamic-island"></div>
      <div class="home-bar"></div>
    </div>
    <span id="label-test" style="font-size:12px;font-weight:600;letter-spacing:0.5px;opacity:0.5;">Spelling Test</span>
  </div>

  <!-- Leaderboard -->
  <div id="screen-leader" class="flex flex-col items-center gap-3">
    <div class="iphone">
      <div class="iphone-glass">
        <div class="iphone-screen">
          <iframe id="iframe-leader" src="screens/original/07-leaderboard.html" scrolling="no"></iframe>
        </div>
      </div>
      <div class="dynamic-island"></div>
      <div class="home-bar"></div>
    </div>
    <span id="label-leader" style="font-size:12px;font-weight:600;letter-spacing:0.5px;opacity:0.5;">Leaderboard</span>
  </div>

</div>


<!-- ═══════════ THEME ENGINE ═══════════ -->
<script>
  // ── Token definitions ──────────────────────────────
  const THEMES = {
    spellbee: {
      name: 'SpellBee Show',
      font: 'font-spellbee',
      dark: {
        bodyBg:       '#1A1A2E',
        barBg:        '#1A1A2E',
        barBorder:    'rgba(255,255,255,0.08)',
        barShadow:    '0 1px 12px rgba(0,0,0,0.4)',
        // active button
        activeBg:     '#C8001E',
        activeBorder: '#C8001E',
        activeText:   '#ffffff',
        activeDot:    '#ffffff',
        // inactive button
        idleBg:       'rgba(255,255,255,0.06)',
        idleBorder:   'rgba(255,255,255,0.12)',
        idleText:     'rgba(255,255,255,0.65)',
        idleDot:      'transparent',
        // mode toggle
        modeBg:       '#F5A500',
        modeBorder:   '#F5A500',
        modeText:     '#1A1A2E',
      },
      light: {
        bodyBg:       '#F7F0E6',
        barBg:        '#F7F0E6',
        barBorder:    'rgba(26,26,46,0.1)',
        barShadow:    '0 1px 12px rgba(0,0,0,0.08)',
        activeBg:     '#C8001E',
        activeBorder: '#C8001E',
        activeText:   '#ffffff',
        activeDot:    '#ffffff',
        idleBg:       'rgba(26,26,46,0.06)',
        idleBorder:   'rgba(26,26,46,0.14)',
        idleText:     'rgba(26,26,46,0.6)',
        idleDot:      'transparent',
        modeBg:       '#1A1A2E',
        modeBorder:   '#1A1A2E',
        modeText:     '#F5A500',
      }
    },

    earth: {
      name: 'Warm Earth',
      font: 'font-earth',
      dark: {
        bodyBg:       '#1C100A',
        barBg:        '#1C100A',
        barBorder:    'rgba(255,255,255,0.07)',
        barShadow:    '0 1px 12px rgba(0,0,0,0.5)',
        activeBg:     '#FF9A00',
        activeBorder: '#FF9A00',
        activeText:   '#ffffff',
        activeDot:    '#ffffff',
        idleBg:       'rgba(255,255,255,0.05)',
        idleBorder:   'rgba(255,255,255,0.1)',
        idleText:     'rgba(255,255,255,0.6)',
        idleDot:      'transparent',
        modeBg:       '#FFD93D',
        modeBorder:   '#FFD93D',
        modeText:     '#4F200D',
      },
      light: {
        bodyBg:       '#F6F1E9',
        barBg:        '#F6F1E9',
        barBorder:    'rgba(79,32,13,0.1)',
        barShadow:    '0 1px 12px rgba(0,0,0,0.06)',
        activeBg:     '#FF9A00',
        activeBorder: '#FF9A00',
        activeText:   '#ffffff',
        activeDot:    '#ffffff',
        idleBg:       'rgba(79,32,13,0.06)',
        idleBorder:   'rgba(79,32,13,0.14)',
        idleText:     'rgba(79,32,13,0.6)',
        idleDot:      'transparent',
        modeBg:       '#4F200D',
        modeBorder:   '#4F200D',
        modeText:     '#FFD93D',
      }
    }
  };

  // ── Variation labels ──────────────────────────────
  const VARIATIONS = {
    base:     { label: 'Base',             desc: 'Default balanced design' },
    gamified: { label: '⚡ Heavy Gamified', desc: 'XP, badges, streaks front and centre' },
    clear:    { label: '🎨 Illustrated',      desc: 'Illustrated, storybook-style design' },
  };

  // ── Variation → screen directory & available files ──
  const SCREEN_DIRS = {
    base:     'screens/original',
    gamified: 'screens/v2',
    clear:    'screens/v3',
  };

  const SCREEN_CONFIG = [
    { file: '02-home.html',          wrapperId: 'screen-home',   iframeId: 'iframe-home',   inVariations: ['base', 'gamified', 'clear'] },
    { file: '04-spelling-test.html', wrapperId: 'screen-test',   iframeId: 'iframe-test',   inVariations: ['base'] },
    { file: '07-leaderboard.html',   wrapperId: 'screen-leader', iframeId: 'iframe-leader', inVariations: ['base', 'gamified', 'clear'] },
  ];

  function updateScreens() {
    const dir = SCREEN_DIRS[activeVariation];
    SCREEN_CONFIG.forEach(({ file, wrapperId, iframeId, inVariations }) => {
      const wrapper = document.getElementById(wrapperId);
      const iframe  = document.getElementById(iframeId);
      if (inVariations.includes(activeVariation)) {
        wrapper.style.display = '';
        iframe.src = `${dir}/${file}`;
      } else {
        wrapper.style.display = 'none';
      }
    });
  }

  // ── State ──────────────────────────────────────────
  let activeTheme     = 'spellbee';
  let activeVariation = 'base';
  let isDark          = true;

  // ── Apply ──────────────────────────────────────────
  function apply() {
    const t = THEMES[activeTheme];
    const c = isDark ? t.dark : t.light;

    // body
    document.getElementById('body').style.background = c.bodyBg;
    document.getElementById('pageBody').style.background = c.bodyBg;

    // topbar
    const bar = document.getElementById('topbar');
    bar.style.background   = c.barBg;
    bar.style.borderColor  = c.barBorder;
    bar.style.boxShadow    = c.barShadow;

    // theme buttons
    ['spellbee', 'earth'].forEach(id => {
      const btn = document.getElementById('btn-' + id);
      const dot = document.getElementById('dot-' + id);
      const isActive = id === activeTheme;

      btn.style.background   = isActive ? c.activeBg     : c.idleBg;
      btn.style.borderColor  = isActive ? c.activeBorder : c.idleBorder;
      btn.style.color        = isActive ? c.activeText   : c.idleText;
      dot.style.background   = isActive ? c.activeDot    : 'transparent';
      dot.style.border       = isActive ? 'none'         : `1.5px solid ${c.idleText}`;
    });

    // mode toggle
    const toggle = document.getElementById('modeToggle');
    toggle.style.background  = c.modeBg;
    toggle.style.borderColor = c.modeBorder;
    toggle.style.color       = c.modeText;

    document.getElementById('modeIcon').textContent  = isDark ? '☀️' : '🌙';
    document.getElementById('modeLabel').textContent = isDark ? 'Light' : 'Dark';

    // screen labels
    ['label-home','label-test','label-leader'].forEach(id => {
      document.getElementById(id).style.color = c.idleText;
    });

    // brand label
    document.getElementById('brand-label').style.color = isDark ? 'rgba(255,255,255,0.88)' : 'rgba(0,0,0,0.78)';

    // variation segmented control container
    const varGroup = document.getElementById('var-group');
    varGroup.style.background  = c.idleBg;
    varGroup.style.borderColor = c.idleBorder;

    // variation buttons
    Object.keys(VARIATIONS).forEach(v => {
      const btn = document.getElementById('btn-' + v);
      const isActive = v === activeVariation;
      btn.style.background = isActive ? c.activeBg   : 'transparent';
      btn.style.color      = isActive ? c.activeText : c.idleText;
    });
  }

  function setTheme(id) {
    activeTheme = id;
    apply();
  }

  function setVariation(v) {
    activeVariation = v;
    updateScreens();
    apply();
  }

  function toggleMode() {
    isDark = !isDark;
    apply();
  }

  // boot
  updateScreens();
  apply();
</script>
</body>
</html>
