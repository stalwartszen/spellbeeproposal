<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Leaderboard · Clarity</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0B0F1E;width:390px;height:844px;overflow:hidden;position:relative;}
.tab{flex:1;padding:10px;text-align:center;font-size:0.78rem;font-weight:700;cursor:pointer;border-radius:10px;}
.tab.active{background:rgba(56,189,248,0.15);color:#38BDF8;border:1px solid rgba(56,189,248,0.3);}
.tab.inactive{color:rgba(180,215,242,0.4);}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:6px;cursor:pointer;}
.rank-row.me{background:rgba(56,189,248,0.08);border:1.5px solid rgba(56,189,248,0.3);}
.rank-row:not(.me){background:#131D35;border:1px solid rgba(56,189,248,0.08);}
.avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:800;color:#0B0F1E;flex-shrink:0;}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:rgba(11,15,30,0.96);backdrop-filter:blur(20px);border-top:1px solid rgba(56,189,248,0.08);padding:10px 0 20px;display:flex;align-items:center;justify-content:space-around;}
.nav-label{font-size:0.6rem;font-weight:600;color:rgba(180,215,242,0.35);}
</style>
</head>
<body>

<div style="position:absolute;inset:0;background-image:linear-gradient(rgba(56,189,248,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>

<!-- Notch -->
<div style="width:120px;height:34px;background:#0B0F1E;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10;"></div>

<div style="padding:48px 20px 84px;height:100%;overflow-y:auto;position:relative;z-index:1;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div style="font-size:1rem;font-weight:800;color:rgba(232,244,255,0.9);letter-spacing:-0.02em;">Leaderboard</div>
    <div style="background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);border-radius:8px;padding:4px 12px;">
      <span style="font-size:0.7rem;font-weight:700;color:#38BDF8;">Season 3</span>
    </div>
  </div>

  <!-- Tabs -->
  <div style="background:#131D35;border:1px solid rgba(56,189,248,0.08);border-radius:14px;padding:4px;display:flex;gap:3px;margin-bottom:20px;">
    <div class="tab active">Class</div>
    <div class="tab inactive">School</div>
    <div class="tab inactive">National</div>
  </div>

  <!-- Podium -->
  <div style="background:rgba(56,189,248,0.04);border:1px solid rgba(56,189,248,0.1);border-radius:16px;padding:16px 10px 0;margin-bottom:16px;">
    <div style="display:flex;align-items:flex-end;justify-content:center;gap:10px;">
      <!-- 2nd -->
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;">
        <div style="font-size:1.2rem;">🥈</div>
        <div style="width:36px;height:36px;background:rgba(129,140,248,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.88rem;color:rgba(232,244,255,0.8);">P</div>
        <div style="font-size:0.62rem;color:rgba(180,215,242,0.55);font-weight:600;">Priya</div>
        <div style="width:100%;height:44px;background:rgba(129,140,248,0.1);border-radius:6px 6px 0 0;border:1px solid rgba(129,140,248,0.2);border-bottom:none;display:flex;align-items:center;justify-content:center;">
          <span style="font-family:'Space Mono',monospace;font-size:0.65rem;color:rgba(180,215,242,0.5);">1,840</span>
        </div>
      </div>
      <!-- 1st -->
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;">
        <div style="font-size:1.4rem;">🏆</div>
        <div style="width:42px;height:42px;background:#38BDF8;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#0B0F1E;box-shadow:0 4px 16px rgba(56,189,248,0.4);">A</div>
        <div style="font-size:0.65rem;color:#38BDF8;font-weight:700;">Aryan</div>
        <div style="width:100%;height:62px;background:rgba(56,189,248,0.12);border-radius:6px 6px 0 0;border:1px solid rgba(56,189,248,0.25);border-bottom:none;display:flex;align-items:center;justify-content:center;">
          <span style="font-family:'Space Mono',monospace;font-size:0.72rem;color:#38BDF8;font-weight:700;">2,340</span>
        </div>
      </div>
      <!-- 3rd -->
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;">
        <div style="font-size:1.2rem;">🥉</div>
        <div style="width:36px;height:36px;background:rgba(244,114,182,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.88rem;color:rgba(232,244,255,0.8);">R</div>
        <div style="font-size:0.62rem;color:rgba(180,215,242,0.55);font-weight:600;">Rohan</div>
        <div style="width:100%;height:34px;background:rgba(244,114,182,0.08);border-radius:6px 6px 0 0;border:1px solid rgba(244,114,182,0.18);border-bottom:none;display:flex;align-items:center;justify-content:center;">
          <span style="font-family:'Space Mono',monospace;font-size:0.65rem;color:rgba(180,215,242,0.5);">1,620</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Rankings -->
  <div>
    <div class="rank-row">
      <div style="font-family:'Space Mono',monospace;font-size:0.78rem;color:rgba(180,215,242,0.35);width:22px;text-align:center;font-weight:700;">4</div>
      <div class="avatar" style="background:rgba(129,140,248,0.8);">S</div>
      <div style="flex:1;">
        <div style="font-size:0.82rem;font-weight:700;color:rgba(232,244,255,0.85);">Sneha</div>
        <div style="font-size:0.62rem;color:rgba(180,215,242,0.38);">Grade 3</div>
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:0.75rem;color:rgba(180,215,242,0.5);">1,510</div>
    </div>
    <div class="rank-row me">
      <div style="font-family:'Space Mono',monospace;font-size:0.78rem;color:#38BDF8;width:22px;text-align:center;font-weight:700;">5</div>
      <div class="avatar" style="background:#38BDF8;">Y</div>
      <div style="flex:1;">
        <div style="font-size:0.82rem;font-weight:700;color:rgba(232,244,255,0.92);">You</div>
        <div style="font-size:0.62rem;color:rgba(56,189,248,0.55);">Grade 3 · 12 streak 🔥</div>
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:0.75rem;color:#38BDF8;font-weight:700;">1,420</div>
    </div>
    <div class="rank-row">
      <div style="font-family:'Space Mono',monospace;font-size:0.78rem;color:rgba(180,215,242,0.35);width:22px;text-align:center;font-weight:700;">6</div>
      <div class="avatar" style="background:rgba(52,211,153,0.8);">K</div>
      <div style="flex:1;">
        <div style="font-size:0.82rem;font-weight:700;color:rgba(232,244,255,0.85);">Karan</div>
        <div style="font-size:0.62rem;color:rgba(180,215,242,0.38);">Grade 3</div>
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:0.75rem;color:rgba(180,215,242,0.5);">1,380</div>
    </div>
    <div class="rank-row">
      <div style="font-family:'Space Mono',monospace;font-size:0.78rem;color:rgba(180,215,242,0.35);width:22px;text-align:center;font-weight:700;">7</div>
      <div class="avatar" style="background:rgba(244,114,182,0.7);">M</div>
      <div style="flex:1;">
        <div style="font-size:0.82rem;font-weight:700;color:rgba(232,244,255,0.85);">Meera</div>
        <div style="font-size:0.62rem;color:rgba(180,215,242,0.38);">Grade 3</div>
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:0.75rem;color:rgba(180,215,242,0.5);">1,260</div>
    </div>
    <div class="rank-row">
      <div style="font-family:'Space Mono',monospace;font-size:0.78rem;color:rgba(180,215,242,0.35);width:22px;text-align:center;font-weight:700;">8</div>
      <div class="avatar" style="background:rgba(180,215,242,0.15);color:rgba(232,244,255,0.7);">A</div>
      <div style="flex:1;">
        <div style="font-size:0.82rem;font-weight:700;color:rgba(232,244,255,0.85);">Anika</div>
        <div style="font-size:0.62rem;color:rgba(180,215,242,0.38);">Grade 3</div>
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:0.75rem;color:rgba(180,215,242,0.5);">1,140</div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">🏠</span><span class="nav-label">Home</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">📖</span><span class="nav-label">Learn</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">✏️</span><span class="nav-label">Test</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">📊</span><span class="nav-label">Progress</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">🏆</span><span class="nav-label" style="color:#38BDF8;">Rank</span></div>
</div>
</body>
</html>
