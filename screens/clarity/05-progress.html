<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Progress · Clarity</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0B0F1E;width:390px;height:844px;overflow:hidden;position:relative;}
.card{background:#131D35;border:1px solid rgba(56,189,248,0.1);border-radius:16px;padding:16px 18px;}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:rgba(11,15,30,0.96);backdrop-filter:blur(20px);border-top:1px solid rgba(56,189,248,0.08);padding:10px 0 20px;display:flex;align-items:center;justify-content:space-around;}
.nav-label{font-size:0.6rem;font-weight:600;color:rgba(180,215,242,0.35);}
.heat-cell{width:14px;height:14px;border-radius:3px;}
</style>
</head>
<body>

<div style="position:absolute;inset:0;background-image:linear-gradient(rgba(56,189,248,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>

<!-- Notch -->
<div style="width:120px;height:34px;background:#0B0F1E;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10;"></div>

<div style="padding:48px 20px 84px;height:100%;overflow-y:auto;position:relative;z-index:1;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div style="font-size:1rem;font-weight:800;color:rgba(232,244,255,0.9);letter-spacing:-0.02em;">Progress</div>
    <div style="background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);border-radius:8px;padding:5px 12px;">
      <span style="font-size:0.7rem;font-weight:700;color:#38BDF8;">This Week</span>
    </div>
  </div>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;">
    <div class="card" style="text-align:center;padding:14px 10px;border-color:rgba(56,189,248,0.18);">
      <div style="font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:#38BDF8;">127</div>
      <div style="font-size:0.62rem;color:rgba(180,215,242,0.4);margin-top:3px;font-weight:600;">Words</div>
    </div>
    <div class="card" style="text-align:center;padding:14px 10px;border-color:rgba(52,211,153,0.18);">
      <div style="font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:#34D399;">84%</div>
      <div style="font-size:0.62rem;color:rgba(180,215,242,0.4);margin-top:3px;font-weight:600;">Accuracy</div>
    </div>
    <div class="card" style="text-align:center;padding:14px 10px;border-color:rgba(244,114,182,0.18);">
      <div style="font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:#F472B6;">12</div>
      <div style="font-size:0.62rem;color:rgba(180,215,242,0.4);margin-top:3px;font-weight:600;">Streak</div>
    </div>
  </div>

  <!-- Bar chart -->
  <div class="card" style="margin-bottom:12px;">
    <div style="font-size:0.65rem;font-weight:700;color:rgba(180,215,242,0.4);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px;">Words per Day</div>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;height:60px;gap:4px;">
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;">
        <div style="width:100%;height:45px;background:rgba(56,189,248,0.3);border-radius:5px 5px 0 0;"></div>
        <div style="font-size:0.58rem;color:rgba(180,215,242,0.3);">M</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;">
        <div style="width:100%;height:55px;background:rgba(56,189,248,0.4);border-radius:5px 5px 0 0;"></div>
        <div style="font-size:0.58rem;color:rgba(180,215,242,0.3);">T</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;">
        <div style="width:100%;height:30px;background:rgba(56,189,248,0.25);border-radius:5px 5px 0 0;"></div>
        <div style="font-size:0.58rem;color:rgba(180,215,242,0.3);">W</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;">
        <div style="width:100%;height:58px;background:rgba(56,189,248,0.45);border-radius:5px 5px 0 0;"></div>
        <div style="font-size:0.58rem;color:rgba(180,215,242,0.3);">T</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;">
        <div style="width:100%;height:44px;background:#38BDF8;border-radius:5px 5px 0 0;"></div>
        <div style="font-size:0.58rem;color:#38BDF8;font-weight:700;">F</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;">
        <div style="width:100%;height:18px;background:rgba(56,189,248,0.15);border-radius:5px 5px 0 0;"></div>
        <div style="font-size:0.58rem;color:rgba(180,215,242,0.3);">S</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;">
        <div style="width:100%;height:7px;background:rgba(56,189,248,0.1);border-radius:5px 5px 0 0;"></div>
        <div style="font-size:0.58rem;color:rgba(180,215,242,0.3);">S</div>
      </div>
    </div>
  </div>

  <!-- Accuracy circle -->
  <div class="card" style="margin-bottom:12px;display:flex;align-items:center;gap:18px;">
    <div style="position:relative;width:70px;height:70px;flex-shrink:0;">
      <svg width="70" height="70" style="transform:rotate(-90deg)">
        <circle cx="35" cy="35" r="29" fill="none" stroke="rgba(52,211,153,0.12)" stroke-width="7"/>
        <circle cx="35" cy="35" r="29" fill="none" stroke="#34D399" stroke-width="7" stroke-dasharray="182" stroke-dashoffset="29"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <div style="font-family:'Space Mono',monospace;font-size:0.95rem;font-weight:700;color:#34D399;">84%</div>
      </div>
    </div>
    <div style="flex:1;">
      <div style="font-size:0.85rem;font-weight:700;color:rgba(232,244,255,0.88);margin-bottom:4px;">Accuracy</div>
      <div style="font-size:0.72rem;color:rgba(180,215,242,0.5);margin-bottom:8px;">127 correct · 24 to review</div>
      <div style="height:4px;background:rgba(52,211,153,0.1);border-radius:4px;overflow:hidden;">
        <div style="width:84%;height:100%;background:#34D399;border-radius:4px;"></div>
      </div>
    </div>
  </div>

  <!-- Heatmap -->
  <div class="card">
    <div style="font-size:0.65rem;font-weight:700;color:rgba(180,215,242,0.4);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;">30-Day Activity</div>
    <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px;">
      <div class="heat-cell" style="background:rgba(56,189,248,0.6);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.85);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.35);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.75);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.5);"></div>
      <div class="heat-cell" style="background:#38BDF8;"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.3);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.65);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.55);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.08);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.8);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.45);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.7);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.9);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.4);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.6);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.08);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.75);"></div>
      <div class="heat-cell" style="background:#38BDF8;"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.5);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.65);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.85);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.38);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.7);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.55);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.08);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.8);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.08);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.05);"></div>
      <div class="heat-cell" style="background:rgba(56,189,248,0.04);"></div>
    </div>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">🏠</span><span class="nav-label">Home</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">📖</span><span class="nav-label">Learn</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">✏️</span><span class="nav-label">Test</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">📊</span><span class="nav-label" style="color:#38BDF8;">Progress</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">👤</span><span class="nav-label">Profile</span></div>
</div>
</body>
</html>
