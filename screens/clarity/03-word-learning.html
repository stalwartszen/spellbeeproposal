<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Learning · Clarity</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0B0F1E;width:390px;height:844px;overflow:hidden;position:relative;}
.card{background:#131D35;border:1px solid rgba(56,189,248,0.1);border-radius:16px;padding:16px 18px;}
.option{background:#131D35;border:1.5px solid rgba(56,189,248,0.12);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.option.correct{background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.45);}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:rgba(11,15,30,0.96);backdrop-filter:blur(20px);border-top:1px solid rgba(56,189,248,0.08);padding:10px 0 20px;display:flex;align-items:center;justify-content:space-around;}
.nav-label{font-size:0.6rem;font-weight:600;color:rgba(180,215,242,0.35);}
</style>
</head>
<body>

<div style="position:absolute;inset:0;background-image:linear-gradient(rgba(56,189,248,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>

<!-- Notch -->
<div style="width:120px;height:34px;background:#0B0F1E;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10;"></div>

<div style="padding:48px 20px 84px;height:100%;overflow-y:auto;position:relative;z-index:1;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <button style="width:36px;height:36px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.15);border-radius:10px;cursor:pointer;color:rgba(180,215,242,0.7);font-size:0.9rem;">←</button>
    <div style="font-size:0.88rem;font-weight:700;color:rgba(232,244,255,0.88);">Word Learning</div>
    <div style="background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);border-radius:8px;padding:4px 10px;">
      <span style="font-family:'Space Mono',monospace;font-size:0.7rem;font-weight:700;color:#38BDF8;">+10 XP</span>
    </div>
  </div>

  <!-- Progress -->
  <div style="height:4px;background:rgba(56,189,248,0.1);border-radius:4px;overflow:hidden;margin-bottom:6px;">
    <div style="width:40%;height:100%;background:#38BDF8;border-radius:4px;"></div>
  </div>
  <div style="display:flex;justify-content:space-between;margin-bottom:24px;">
    <span style="font-size:0.65rem;font-weight:700;color:#38BDF8;">4 / 10</span>
    <span style="font-size:0.65rem;color:rgba(180,215,242,0.35);">Grade 3</span>
  </div>

  <!-- Word card -->
  <div class="card" style="text-align:center;margin-bottom:20px;padding:28px 24px;border-color:rgba(56,189,248,0.2);">
    <div style="width:52px;height:52px;background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.5rem;cursor:pointer;">🔊</div>
    <div style="font-family:'Space Mono',monospace;font-size:1.5rem;font-weight:700;color:rgba(232,244,255,0.95);margin-bottom:6px;letter-spacing:2px;">PERSEVERANCE</div>
    <div style="font-size:0.72rem;color:rgba(180,215,242,0.4);margin-bottom:12px;">/pər·sev·ər·əns/</div>
    <div style="display:inline-flex;align-items:center;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.18);border-radius:6px;padding:4px 12px;">
      <span style="font-size:0.68rem;font-weight:700;color:rgba(56,189,248,0.8);letter-spacing:0.06em;">NOUN</span>
    </div>
  </div>

  <!-- Question -->
  <div style="font-size:0.7rem;font-weight:700;color:rgba(180,215,242,0.4);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;">Choose the correct meaning:</div>

  <div style="display:flex;flex-direction:column;gap:8px;">
    <div class="option">
      <div style="width:26px;height:26px;border-radius:6px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:0.72rem;color:rgba(180,215,242,0.5);font-weight:700;flex-shrink:0;">A</div>
      <span style="font-size:0.85rem;color:rgba(180,215,242,0.65);">Giving up quickly on a task</span>
    </div>
    <div class="option correct">
      <div style="width:26px;height:26px;border-radius:6px;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.4);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:0.72rem;color:#34D399;font-weight:700;flex-shrink:0;">B</div>
      <span style="font-size:0.85rem;color:rgba(232,244,255,0.9);font-weight:600;">Continuing despite difficulty</span>
      <span style="margin-left:auto;font-size:0.8rem;color:#34D399;">✓</span>
    </div>
    <div class="option">
      <div style="width:26px;height:26px;border-radius:6px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:0.72rem;color:rgba(180,215,242,0.5);font-weight:700;flex-shrink:0;">C</div>
      <span style="font-size:0.85rem;color:rgba(180,215,242,0.65);">A type of ancient ritual</span>
    </div>
    <div class="option">
      <div style="width:26px;height:26px;border-radius:6px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:0.72rem;color:rgba(180,215,242,0.5);font-weight:700;flex-shrink:0;">D</div>
      <span style="font-size:0.85rem;color:rgba(180,215,242,0.65);">A musical performance style</span>
    </div>
  </div>

  <div style="margin-top:16px;">
    <button style="width:100%;padding:14px;background:#38BDF8;border:none;border-radius:12px;font-size:0.9rem;font-weight:700;color:#0B0F1E;cursor:pointer;">Next Word →</button>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">🏠</span><span class="nav-label">Home</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">📖</span><span class="nav-label" style="color:#38BDF8;">Learn</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">✏️</span><span class="nav-label">Test</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">📊</span><span class="nav-label">Progress</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.1rem;">👤</span><span class="nav-label">Profile</span></div>
</div>
</body>
</html>
