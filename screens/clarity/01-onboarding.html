<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Onboarding · Clarity</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0B0F1E;width:390px;height:844px;overflow:hidden;position:relative;}
.card{background:#131D35;border:1px solid rgba(56,189,248,0.12);border-radius:16px;padding:16px 18px;}
.grade-btn{background:#131D35;border:1.5px solid rgba(56,189,248,0.15);border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer;}
.grade-btn.sel{background:rgba(56,189,248,0.12);border-color:#38BDF8;}
.step-dot{width:8px;height:8px;border-radius:50%;background:rgba(56,189,248,0.2);}
.step-dot.active{background:#38BDF8;width:24px;border-radius:4px;}
</style>
</head>
<body>

<!-- Subtle grid -->
<div style="position:absolute;inset:0;background-image:linear-gradient(rgba(56,189,248,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>

<!-- Notch -->
<div style="width:120px;height:34px;background:#0B0F1E;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10;"></div>

<div style="padding:52px 24px 24px;height:100%;display:flex;flex-direction:column;position:relative;z-index:1;">

  <!-- Step -->
  <div style="display:flex;gap:6px;align-items:center;margin-bottom:36px;">
    <div class="step-dot active"></div>
    <div class="step-dot active"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
  </div>

  <!-- Title -->
  <div style="margin-bottom:32px;">
    <div style="font-size:0.68rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(56,189,248,0.6);margin-bottom:10px;">Step 2 of 4</div>
    <h1 style="font-size:1.8rem;font-weight:800;color:rgba(232,244,255,0.92);line-height:1.2;letter-spacing:-0.02em;margin-bottom:8px;">Select your<br>grade level</h1>
    <p style="font-size:0.85rem;color:rgba(180,215,242,0.55);line-height:1.6;">We personalise your word list and difficulty for your grade.</p>
  </div>

  <!-- Grade grid -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:28px;">
    <div class="grade-btn"><div style="font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:rgba(232,244,255,0.6);">1</div></div>
    <div class="grade-btn"><div style="font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:rgba(232,244,255,0.6);">2</div></div>
    <div class="grade-btn sel">
      <div style="font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:#38BDF8;">3</div>
    </div>
    <div class="grade-btn"><div style="font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:rgba(232,244,255,0.6);">4</div></div>
    <div class="grade-btn"><div style="font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:rgba(232,244,255,0.6);">5</div></div>
    <div class="grade-btn"><div style="font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:rgba(232,244,255,0.6);">6</div></div>
    <div class="grade-btn"><div style="font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:rgba(232,244,255,0.6);">7</div></div>
    <div class="grade-btn"><div style="font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:rgba(232,244,255,0.6);">8</div></div>
  </div>

  <!-- Info -->
  <div class="card" style="margin-bottom:28px;display:flex;align-items:center;gap:14px;">
    <div style="width:40px;height:40px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;">📋</div>
    <div>
      <div style="font-size:0.85rem;font-weight:700;color:rgba(232,244,255,0.88);">Grade 3 — Selected</div>
      <div style="font-size:0.72rem;color:rgba(180,215,242,0.5);margin-top:2px;">180 curated words · CEFR A2–B1</div>
    </div>
    <div style="margin-left:auto;width:20px;height:20px;background:rgba(56,189,248,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#38BDF8;flex-shrink:0;">✓</div>
  </div>

  <div style="flex:1;"></div>

  <button style="width:100%;padding:16px;background:#38BDF8;border:none;border-radius:14px;font-size:0.95rem;font-weight:700;color:#0B0F1E;cursor:pointer;letter-spacing:0.02em;">Continue →</button>

  <p style="text-align:center;font-size:0.68rem;color:rgba(140,185,225,0.35);margin-top:12px;">Adjustable in Settings at any time</p>
</div>
</body>
</html>
