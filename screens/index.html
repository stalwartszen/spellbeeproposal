<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Screen Library</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #0A0818; color: #fff; min-height: 100vh; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
  @keyframes float { 0%,100% { transform:translateY(0px); } 50% { transform:translateY(-8px); } }
  .fade-up { opacity:0; animation: fadeUp 0.6s ease forwards; }
  .card { background: #1A1740; border: 1px solid #231F55; border-radius: 20px; overflow: hidden; transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer; text-decoration: none; display: block; }
  .card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 20px 60px rgba(108,99,255,0.3); border-color: #6C63FF; }
  .phase-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.5px; }
  .shimmer-btn { background: linear-gradient(90deg, #6C63FF, #8B7FFF, #6C63FF); background-size: 200% 100%; animation: shimmer 2s infinite; }
  .bee-float { animation: float 3s ease-in-out infinite; }
  .screen-thumb { width: 100%; aspect-ratio: 9/16; background: #0F0D2A; border-radius: 12px 12px 0 0; position: relative; overflow: hidden; }
  .thumb-notch { width: 60px; height: 20px; background: #0A0818; border-radius: 0 0 12px 12px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
  .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .star { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.4); border-radius: 50%; animation: float 4s ease-in-out infinite; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- Header -->
<div style="position:relative;z-index:1;" class="max-w-5xl mx-auto px-6 pt-12 pb-8">
  <div class="text-center mb-12 fade-up" style="animation-delay:0ms">
    <div class="bee-float text-6xl mb-4">🐝</div>
    <h1 style="font-family:'Space Mono',monospace; font-size:2rem; font-weight:700; background:linear-gradient(135deg,#6C63FF,#00C896); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Spell Bee</h1>
    <p style="color:#FFFFFF99; font-size:1rem; margin-top:4px; font-weight:500;">Screen Library · 14 Screens</p>
    <div class="flex items-center justify-center gap-3 mt-4">
      <span class="phase-badge" style="background:rgba(108,99,255,0.2); color:#6C63FF; border:1px solid rgba(108,99,255,0.4);">Phase 1 · 8 screens</span>
      <span class="phase-badge" style="background:rgba(0,200,150,0.2); color:#00C896; border:1px solid rgba(0,200,150,0.4);">Phase 2 · 6 screens</span>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="grid grid-cols-4 gap-4 mb-10 fade-up" style="animation-delay:100ms">
    <div style="background:#1A1740; border:1px solid #231F55; border-radius:16px; padding:16px; text-align:center;">
      <div style="font-family:'Space Mono',monospace; font-size:1.5rem; font-weight:700; color:#6C63FF;">14</div>
      <div style="color:#FFFFFF99; font-size:0.75rem; margin-top:2px;">Screens</div>
    </div>
    <div style="background:#1A1740; border:1px solid #231F55; border-radius:16px; padding:16px; text-align:center;">
      <div style="font-family:'Space Mono',monospace; font-size:1.5rem; font-weight:700; color:#00C896;">2</div>
      <div style="color:#FFFFFF99; font-size:0.75rem; margin-top:2px;">Phases</div>
    </div>
    <div style="background:#1A1740; border:1px solid #231F55; border-radius:16px; padding:16px; text-align:center;">
      <div style="font-family:'Space Mono',monospace; font-size:1.5rem; font-weight:700; color:#F5A623;">6</div>
      <div style="color:#FFFFFF99; font-size:0.75rem; margin-top:2px;">Flows</div>
    </div>
    <div style="background:#1A1740; border:1px solid #231F55; border-radius:16px; padding:16px; text-align:center;">
      <div style="font-family:'Space Mono',monospace; font-size:1.5rem; font-weight:700; color:#FF5C35;">∞</div>
      <div style="color:#FFFFFF99; font-size:0.75rem; margin-top:2px;">Fun</div>
    </div>
  </div>

  <!-- Screen Grid -->
  <div class="grid grid-cols-2 gap-5" id="screenGrid">
  </div>

  <div class="text-center mt-12 fade-up" style="animation-delay:1000ms; color:#FFFFFF44; font-size:0.75rem;">
    Spell Bee · Gamified Learning App · All screens handcrafted
  </div>
</div>

<script>
// Generate stars
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s = document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDelay=Math.random()*4+'s';
  s.style.opacity=Math.random()*0.6+0.1;
  s.style.width=s.style.height=(Math.random()*2+1)+'px';
  starsEl.appendChild(s);
}

const screens = [
  { file:'01-onboarding.html', name:'Onboarding', sub:'Grade Select · Step 2', phase:1, color:'#6C63FF', icon:'👋', thumb: drawOnboarding },
  { file:'02-home.html', name:'Home Dashboard', sub:'Streak · Daily Goal · Actions', phase:1, color:'#F5A623', icon:'🏠', thumb: drawHome },
  { file:'03-word-learning.html', name:'Word Learning', sub:'MCQ · Audio · Progress', phase:1, color:'#00C896', icon:'📖', thumb: drawLearning },
  { file:'04-spelling-test.html', name:'Spelling Test', sub:'Timer · Tiles · Keyboard', phase:1, color:'#FF5C35', icon:'✏️', thumb: drawTest },
  { file:'05-results.html', name:'Results', sub:'Score · XP · Review', phase:1, color:'#6C63FF', icon:'🏆', thumb: drawResults },
  { file:'06-progress.html', name:'Progress', sub:'Charts · Heatmap · Stats', phase:1, color:'#00C896', icon:'📊', thumb: drawProgress },
  { file:'07-leaderboard.html', name:'Leaderboard', sub:'Podium · Rankings · XP', phase:1, color:'#F5A623', icon:'🥇', thumb: drawLeaderboard },
  { file:'08-streak-rewards.html', name:'Streak & Rewards', sub:'Badges · Daily Claim · XP', phase:1, color:'#FF5C35', icon:'🔥', thumb: drawStreak },
  { file:'09-ai-path.html', name:'AI Learning Path', sub:'Timeline · Personalised', phase:2, color:'#6C63FF', icon:'🤖', thumb: drawAI },
  { file:'10-tournament.html', name:'Tournament Battle', sub:'Live · VS · Real-time', phase:2, color:'#FF5C35', icon:'⚔️', thumb: drawTournament },
  { file:'11-national-ranking.html', name:'National Ranking', sub:'Tier · Top 5 · Insights', phase:2, color:'#F5A623', icon:'🌍', thumb: drawNational },
  { file:'12-badges.html', name:'Badges', sub:'Achievements · Unlocks', phase:2, color:'#00C896', icon:'🎖️', thumb: drawBadges },
  { file:'13-parent-dashboard.html', name:'Parent Dashboard', sub:'Stats · Screen Time · Progress', phase:2, color:'#6C63FF', icon:'👨‍👩‍👧', thumb: drawParent },
  { file:'14-admin.html', name:'Admin Panel', sub:'Word Banks · Analytics', phase:2, color:'#FF5C35', icon:'⚙️', thumb: drawAdmin },
];

function drawOnboarding(canvas){
  const ctx = canvas.getContext('2d'); const w=canvas.width, h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle='rgba(108,99,255,0.15)'; ctx.beginPath(); ctx.arc(w/2,h*0.22,30,0,Math.PI*2); ctx.fill();
  ctx.font='24px serif'; ctx.fillText('🐝',w/2-12,h*0.25);
  ctx.fillStyle='rgba(108,99,255,0.4)'; ctx.fillRect(w*0.1,h*0.35,w*0.8,20);
  ['1','2','3','4','5','6','7','8'].forEach((g,i)=>{
    const col=i%4, row=Math.floor(i/4);
    const x=w*0.1+col*(w*0.2)+4, y=h*0.45+row*26;
    ctx.fillStyle = i===2?'#6C63FF':'rgba(35,31,85,0.8)';
    ctx.beginPath(); ctx.roundRect(x,y,w*0.17,20,6); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='9px Inter'; ctx.fillText(g,x+w*0.07,y+14);
  });
  ctx.fillStyle='#6C63FF'; ctx.beginPath(); ctx.roundRect(w*0.1,h*0.75,w*0.8,28,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 10px Inter'; ctx.fillText("Let's Go →",w/2-22,h*0.775);
}
function drawHome(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle='rgba(245,166,35,0.2)'; ctx.beginPath(); ctx.arc(w*0.15,h*0.1,18,0,Math.PI*2); ctx.fill();
  ctx.font='14px serif'; ctx.fillText('🔥',w*0.07,h*0.115);
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(w*0.05,h*0.18,w*0.9,10);
  ctx.fillStyle='#00C896'; ctx.fillRect(w*0.05,h*0.18,w*0.9*0.65,10);
  ['#6C63FF','#FF5C35','#F5A623','#00C896'].forEach((c,i)=>{
    const col=i%2,row=Math.floor(i/2);
    const x=w*0.05+col*(w*0.47)+2,y=h*0.27+row*(h*0.12)+2;
    ctx.fillStyle=c+'33'; ctx.beginPath(); ctx.roundRect(x,y,w*0.43,h*0.1,10); ctx.fill();
    ctx.fillStyle=c; ctx.beginPath(); ctx.roundRect(x,y,w*0.43,h*0.1,10); ctx.strokeStyle=c+'66'; ctx.stroke();
  });
  ctx.fillStyle='rgba(26,23,64,0.9)'; ctx.beginPath(); ctx.roundRect(w*0.05,h*0.56,w*0.9,h*0.15,10); ctx.fill();
  ctx.fillStyle='#6C63FF'; ctx.font='bold 9px Inter'; ctx.fillText('WORD OF THE DAY',w*0.09,h*0.605);
  ctx.fillStyle='#fff'; ctx.font='bold 11px Space Mono'; ctx.fillText('EPHEMERAL',w*0.09,h*0.635);
}
function drawLearning(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(w*0.05,h*0.12,w*0.9,6);
  ctx.fillStyle='#6C63FF'; ctx.fillRect(w*0.05,h*0.12,w*0.9*0.4,6);
  ctx.fillStyle='rgba(0,200,150,0.15)'; ctx.beginPath(); ctx.arc(w/2,h*0.28,22,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#00C896'; ctx.font='16px serif'; ctx.fillText('🔊',w/2-8,h*0.295);
  ctx.fillStyle='#fff'; ctx.font='bold 11px Space Mono'; ctx.fillText('PERSEVERANCE',w/2-52,h*0.42);
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='8px Inter'; ctx.fillText('/pər·sev·ər·əns/',w/2-38,h*0.46);
  ['Option A','Option B','Option C','Option D'].forEach((o,i)=>{
    const y=h*0.54+i*28;
    ctx.fillStyle=i===1?'rgba(0,200,150,0.2)':'rgba(35,31,85,0.8)';
    ctx.beginPath(); ctx.roundRect(w*0.05,y,w*0.9,22,8); ctx.fill();
    if(i===1){ctx.strokeStyle='#00C896'; ctx.lineWidth=1; ctx.stroke();}
    ctx.fillStyle=i===1?'#00C896':'rgba(255,255,255,0.7)'; ctx.font='8px Inter'; ctx.fillText(o,w*0.1,y+14);
  });
}
function drawTest(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,92,53,0.3)'; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(w/2,h*0.22,28,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#FF5C35'; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(w/2,h*0.22,28,-Math.PI/2,Math.PI); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 12px Space Mono'; ctx.fillText('0:23',w/2-14,h*0.228);
  ctx.fillStyle='rgba(0,200,150,0.15)'; ctx.beginPath(); ctx.arc(w/2,h*0.42,24,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#00C896'; ctx.font='18px serif'; ctx.fillText('▶',w/2-6,h*0.432);
  ['P','E','R','S','_','_'].forEach((l,i)=>{
    const x=w*0.05+i*16; const y=h*0.56;
    ctx.fillStyle=l==='_'?'rgba(35,31,85,0.8)':'rgba(108,99,255,0.3)';
    ctx.beginPath(); ctx.roundRect(x,y,14,18,4); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 8px Space Mono'; ctx.fillText(l,x+4,y+13);
  });
  for(let row=0;row<3;row++){
    for(let col=0;col<9;col++){
      ctx.fillStyle='rgba(35,31,85,0.8)'; ctx.beginPath(); ctx.roundRect(w*0.03+col*11,h*0.68+row*14,10,12,3); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='6px Inter'; ctx.fillText(String.fromCharCode(65+row*9+col),w*0.03+col*11+3,h*0.68+row*14+9);
    }
  }
  ctx.fillStyle='#FF5C35'; ctx.beginPath(); ctx.roundRect(w*0.1,h*0.86,w*0.8,22,8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 9px Inter'; ctx.fillText('SUBMIT',w/2-16,h*0.876);
}
function drawResults(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  [['#6C63FF',0.3],['#00C896',0.5],['#F5A623',0.7]].forEach(([c,op])=>{
    for(let i=0;i<8;i++){
      ctx.fillStyle=c; ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h*0.4,3,0,Math.PI*2); ctx.fill();
    }
  });
  ctx.strokeStyle='rgba(0,200,150,0.2)'; ctx.lineWidth=8; ctx.beginPath(); ctx.arc(w/2,h*0.28,36,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#00C896'; ctx.lineWidth=8; ctx.beginPath(); ctx.arc(w/2,h*0.28,36,-Math.PI/2,Math.PI*1.1); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 18px Space Mono'; ctx.fillText('8/10',w/2-20,h*0.292);
  ['#00C896','#FF5C35','#F5A623'].forEach((c,i)=>{
    const x=w*0.05+i*(w*0.31);
    ctx.fillStyle=c+'22'; ctx.beginPath(); ctx.roundRect(x,h*0.45,w*0.28,40,8); ctx.fill();
    ctx.fillStyle=c; ctx.font='bold 14px Space Mono'; ctx.fillText(i===0?'8':i===1?'1':'1',x+12,h*0.482);
  });
  ctx.fillStyle='rgba(108,99,255,0.3)'; ctx.beginPath(); ctx.roundRect(w*0.25,h*0.6,w*0.5,22,20); ctx.fill();
  ctx.fillStyle='#6C63FF'; ctx.font='bold 10px Inter'; ctx.fillText('+120 XP',w/2-18,h*0.617);
}
function drawProgress(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  const bars=[60,85,45,90,70,55,80];
  bars.forEach((v,i)=>{
    const bh=(v/100)*(h*0.2); const x=w*0.06+i*(w*0.128); const y=h*0.32-bh;
    ctx.fillStyle='rgba(108,99,255,0.3)'; ctx.fillRect(x,h*0.12,w*0.1,h*0.2);
    ctx.fillStyle='#6C63FF'; ctx.fillRect(x,y,w*0.1,bh);
  });
  ctx.strokeStyle='rgba(0,200,150,0.2)'; ctx.lineWidth=8; ctx.beginPath(); ctx.arc(w/2,h*0.55,30,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#00C896'; ctx.lineWidth=8; ctx.beginPath(); ctx.arc(w/2,h*0.55,30,-Math.PI/2,Math.PI*0.94); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 10px Space Mono'; ctx.fillText('72%',w/2-14,h*0.556);
  for(let r=0;r<4;r++) for(let c=0;c<7;c++){
    const alpha=Math.random();
    ctx.fillStyle=`rgba(0,200,150,${alpha*0.8+0.1})`; ctx.beginPath(); ctx.roundRect(w*0.04+c*13,h*0.7+r*11,11,9,2); ctx.fill();
  }
}
function drawLeaderboard(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  [[w/2,'#F5A623',h*0.18,1],[w*0.25,'#FFFFFF99',h*0.24,2],[w*0.75,'#F5A623aa',h*0.27,3]].forEach(([x,c,topY,rank])=>{
    ctx.fillStyle=c+'33'; ctx.fillRect(x-20,topY,40,h*0.15);
    ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,topY-12,16,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0F0D2A'; ctx.font='bold 10px Inter'; ctx.fillText(rank,x-4,topY-7);
  });
  [4,5,6,7,8].forEach((rank,i)=>{
    const y=h*0.42+i*28;
    ctx.fillStyle=rank===5?'rgba(108,99,255,0.2)':'rgba(26,23,64,0.8)';
    ctx.beginPath(); ctx.roundRect(w*0.04,y,w*0.92,24,8); ctx.fill();
    if(rank===5){ctx.strokeStyle='#6C63FF'; ctx.lineWidth=1; ctx.stroke();}
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='7px Inter'; ctx.fillText('#'+rank,w*0.08,y+15);
    ctx.fillStyle='#fff'; ctx.font='8px Inter'; ctx.fillText('Player '+rank,w*0.18,y+15);
    ctx.fillStyle='#6C63FF'; ctx.font='7px Space Mono'; ctx.fillText((2100-rank*120)+' XP',w*0.72,y+15);
  });
}
function drawStreak(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  const grad=ctx.createRadialGradient(w/2,h*0.25,0,w/2,h*0.25,50);
  grad.addColorStop(0,'rgba(245,166,35,0.3)'); grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad; ctx.fillRect(0,0,w,h*0.5);
  ctx.font='40px serif'; ctx.fillText('🔥',w/2-20,h*0.2);
  ctx.fillStyle='#F5A623'; ctx.font='bold 20px Space Mono'; ctx.fillText('12',w/2-10,h*0.28);
  [1,2,3,4,5,6,7].forEach((d,i)=>{
    const x=w*0.04+i*(w*0.135);
    ctx.fillStyle=i<5?'#F5A623':'rgba(35,31,85,0.8)';
    ctx.beginPath(); ctx.arc(x+12,h*0.38,10,0,Math.PI*2); ctx.fill();
    if(i<5){ctx.font='10px serif'; ctx.fillText('🔥',x+6,h*0.388);}
  });
  const badges=['⚡','🏆','⭐','🎯','🔥','📚','🎖️','💎','🌟'];
  badges.forEach((b,i)=>{
    const col=i%3,row=Math.floor(i/3);
    ctx.fillStyle=i<5?'rgba(108,99,255,0.2)':'rgba(35,31,85,0.5)';
    ctx.beginPath(); ctx.arc(w*0.17+col*(w*0.3),h*0.55+row*(h*0.1),16,0,Math.PI*2); ctx.fill();
    if(i<5){ctx.font='14px serif'; ctx.fillText(b,w*0.17+col*(w*0.3)-7,h*0.558+row*(h*0.1));}
    else{ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='12px serif'; ctx.fillText('🔒',w*0.17+col*(w*0.3)-6,h*0.556+row*(h*0.1));}
  });
}
function drawAI(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  const nodes=[{y:0.18,c:'#00C896',done:true},{y:0.33,c:'#6C63FF',current:true},{y:0.48,c:'rgba(255,255,255,0.2)',done:false},{y:0.63,c:'rgba(255,255,255,0.2)',done:false}];
  ctx.strokeStyle='rgba(108,99,255,0.3)'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(w/2,nodes[0].y*h); ctx.lineTo(w/2,nodes[3].y*h); ctx.stroke(); ctx.setLineDash([]);
  nodes.forEach((n,i)=>{
    ctx.fillStyle=n.c; ctx.beginPath(); ctx.arc(w/2,n.y*h,12,0,Math.PI*2); ctx.fill();
    if(n.current){ctx.strokeStyle='#6C63FF'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(w/2,n.y*h,18,0,Math.PI*2); ctx.stroke();}
    if(n.done){ctx.fillStyle='#0F0D2A'; ctx.font='bold 10px Inter'; ctx.fillText('✓',w/2-4,n.y*h+4);}
    if(n.current){
      ctx.fillStyle='rgba(108,99,255,0.15)'; ctx.beginPath(); ctx.roundRect(w*0.06,n.y*h+22,w*0.88,50,10); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 9px Inter'; ctx.fillText('Compound Words · 12 words',w*0.1,n.y*h+38);
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='8px Inter'; ctx.fillText('Est. 8 min · Medium',w*0.1,n.y*h+52);
    }
  });
}
function drawTournament(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#FF5C35'; ctx.beginPath(); ctx.arc(w*0.08,h*0.07,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='8px Inter'; ctx.fillText('LIVE',w*0.11,h*0.075);
  ctx.fillStyle='rgba(108,99,255,0.2)'; ctx.beginPath(); ctx.roundRect(w*0.03,h*0.15,w*0.43,h*0.2,10); ctx.fill();
  ctx.fillStyle='rgba(255,92,53,0.2)'; ctx.beginPath(); ctx.roundRect(w*0.54,h*0.15,w*0.43,h*0.2,10); ctx.fill();
  ctx.fillStyle='#6C63FF'; ctx.beginPath(); ctx.arc(w*0.165,h*0.22,20,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FF5C35'; ctx.beginPath(); ctx.arc(w*0.77,h*0.22,20,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 14px Space Mono'; ctx.fillText('4',w*0.21,h*0.32);
  ctx.fillStyle='#fff'; ctx.font='bold 14px Space Mono'; ctx.fillText('3',w*0.81,h*0.32);
  ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.font='bold 10px Space Mono'; ctx.fillText('VS',w/2-8,h*0.245);
  ['P','E','R','_','_'].forEach((l,i)=>{
    const x=w*0.05+i*18;
    ctx.fillStyle=l==='_'?'rgba(35,31,85,0.8)':'rgba(108,99,255,0.4)';
    ctx.beginPath(); ctx.roundRect(x,h*0.62,16,20,4); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 9px Space Mono'; ctx.fillText(l,x+4,h*0.636);
  });
  ctx.fillStyle='#FF5C35'; ctx.beginPath(); ctx.roundRect(w*0.1,h*0.8,w*0.8,28,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 11px Inter'; ctx.fillText('SUBMIT',w/2-18,h*0.82);
}
function drawNational(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  const grad=ctx.createLinearGradient(0,0,w,h*0.3);
  grad.addColorStop(0,'rgba(245,166,35,0.2)'); grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad; ctx.fillRect(0,0,w,h*0.35);
  ctx.fillStyle='rgba(26,23,64,0.9)'; ctx.beginPath(); ctx.roundRect(w*0.05,h*0.1,w*0.9,h*0.18,14); ctx.fill();
  ctx.fillStyle='#F5A623'; ctx.font='bold 14px Space Mono'; ctx.fillText('#142',w*0.1,h*0.2);
  ctx.fillStyle='#fff'; ctx.font='bold 9px Inter'; ctx.fillText('NATIONALLY',w*0.1,h*0.23);
  ctx.fillStyle='rgba(245,166,35,0.3)'; ctx.beginPath(); ctx.roundRect(w*0.6,h*0.14,w*0.3,20,20); ctx.fill();
  ctx.fillStyle='#F5A623'; ctx.font='bold 8px Inter'; ctx.fillText('GOLD LEAGUE',w*0.62,h*0.156);
  ['Bronze','Silver','Gold','Platinum'].forEach((tier,i)=>{
    const x=w*0.05+i*(w*0.23);
    ctx.fillStyle=i===2?'#F5A623':'rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.arc(x+15,h*0.42,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=i===2?'#F5A623':'rgba(255,255,255,0.5)'; ctx.font='6px Inter'; ctx.fillText(tier,x,h*0.46);
  });
}
function drawBadges(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  const emojis=['🔥','⚡','⭐','📚','🏆','🎯','🌟','💎','🔒'];
  const earned=[true,true,true,true,true,false,false,false,false];
  emojis.forEach((e,i)=>{
    const col=i%3, row=Math.floor(i/3);
    const cx=w*0.18+col*(w*0.3), cy=h*0.22+row*(h*0.18);
    if(earned[i]){
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,22);
      g.addColorStop(0,'rgba(108,99,255,0.4)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,28,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle=earned[i]?'rgba(108,99,255,0.3)':'rgba(35,31,85,0.5)';
    ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2); ctx.fill();
    ctx.font=earned[i]?'18px serif':'14px serif';
    ctx.globalAlpha=earned[i]?1:0.3;
    ctx.fillText(e,cx-9,cy+7);
    ctx.globalAlpha=1;
  });
  ctx.fillStyle='rgba(0,200,150,0.9)'; ctx.beginPath(); ctx.roundRect(w*0.05,h*0.85,w*0.9,28,20); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 9px Inter'; ctx.fillText('New Badge Unlocked! 🎉',w/2-42,h*0.87);
}
function drawParent(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  ['#6C63FF','#00C896'].forEach((c,i)=>{
    ctx.fillStyle=c; ctx.beginPath(); ctx.arc(w*0.25+i*w*0.2,h*0.12,18,0,Math.PI*2); ctx.fill();
    if(i===0){ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(w*0.25,h*0.12,20,0,Math.PI*2); ctx.stroke();}
  });
  [['45m','This Week'],['23','Words'],['89%','Accuracy']].forEach(([v,l],i)=>{
    const x=w*0.04+i*(w*0.32);
    ctx.fillStyle='rgba(26,23,64,0.9)'; ctx.beginPath(); ctx.roundRect(x,h*0.25,w*0.29,50,10); ctx.fill();
    ctx.fillStyle='#6C63FF'; ctx.font='bold 12px Space Mono'; ctx.fillText(v,x+10,h*0.29);
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='7px Inter'; ctx.fillText(l,x+10,h*0.31);
  });
  const bars=[40,70,55,85,60,50,75];
  bars.forEach((v,i)=>{
    const bh=(v/100)*(h*0.12); const x=w*0.05+i*(w*0.13);
    ctx.fillStyle='rgba(108,99,255,0.3)'; ctx.fillRect(x,h*0.44,w*0.1,h*0.12);
    ctx.fillStyle='#6C63FF'; ctx.fillRect(x,h*0.44+(h*0.12-bh),w*0.1,bh);
  });
  ctx.fillStyle='rgba(108,99,255,0.8)'; ctx.beginPath(); ctx.roundRect(w*0.1,h*0.78,w*0.8,28,20); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 9px Inter'; ctx.fillText('Send Encouragement 💌',w/2-44,h*0.8);
}
function drawAdmin(canvas){
  const ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height;
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#0F0D2A'; ctx.fillRect(0,0,w*0.3,h);
  ctx.fillStyle='rgba(108,99,255,0.2)'; ctx.fillRect(w*0.3,0,1,h);
  ['Words','Grades','Stats','Settings'].forEach((item,i)=>{
    const y=h*0.15+i*h*0.12;
    ctx.fillStyle=i===0?'rgba(108,99,255,0.3)':'transparent';
    ctx.beginPath(); ctx.roundRect(w*0.02,y-12,w*0.26,24,6); ctx.fill();
    ctx.fillStyle=i===0?'#6C63FF':'rgba(255,255,255,0.5)'; ctx.font='8px Inter'; ctx.fillText(item,w*0.06,y+4);
  });
  [['4,280','#6C63FF'],['12,450','#00C896'],['74%','#F5A623']].forEach(([v,c],i)=>{
    const x=w*0.32+i*(w*0.22);
    ctx.fillStyle=c+'22'; ctx.beginPath(); ctx.roundRect(x,h*0.05,w*0.2,40,8); ctx.fill();
    ctx.fillStyle=c; ctx.font='bold 9px Space Mono'; ctx.fillText(v,x+6,h*0.1);
  });
  for(let r=0;r<4;r++){
    ctx.fillStyle=r%2===0?'rgba(26,23,64,0.5)':'transparent';
    ctx.fillRect(w*0.32,h*0.3+r*h*0.1,w*0.68,h*0.1-2);
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='7px Inter'; ctx.fillText(['EPHEMERAL','PERSEVERANCE','MELANCHOLY','AMBIGUOUS'][r],w*0.34,h*0.35+r*h*0.1);
  }
}

const grid = document.getElementById('screenGrid');
screens.forEach((screen, idx) => {
  const delay = idx * 80;
  const card = document.createElement('a');
  card.href = screen.file;
  card.className = 'card fade-up';
  card.style.animationDelay = delay + 'ms';

  const canvas = document.createElement('canvas');
  canvas.width = 200; canvas.height = 355;
  canvas.style.cssText = 'width:100%;display:block;border-radius:12px 12px 0 0;';
  screen.thumb(canvas);

  const info = document.createElement('div');
  info.style.cssText = 'padding:14px 16px;';
  info.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <span style="font-size:1.1rem;">${screen.icon}</span>
      <span class="phase-badge" style="${screen.phase===1?'background:rgba(108,99,255,0.2);color:#6C63FF;border:1px solid rgba(108,99,255,0.3);':'background:rgba(0,200,150,0.2);color:#00C896;border:1px solid rgba(0,200,150,0.3);'}">Phase ${screen.phase}</span>
    </div>
    <div style="font-weight:700;font-size:0.9rem;color:#fff;margin-bottom:3px;">${screen.name}</div>
    <div style="font-size:0.72rem;color:#FFFFFF99;">${screen.sub}</div>
    <div style="margin-top:10px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;">
      <div style="height:2px;width:${(idx+1)/14*100}%;background:${screen.color};border-radius:2px;transition:width 1s ease;"></div>
    </div>
  `;

  const notch = document.createElement('div');
  notch.style.cssText = `
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:50px; height:14px; background:#0A0818; border-radius:0 0 10px 10px;
  `;

  const thumbWrap = document.createElement('div');
  thumbWrap.style.cssText = 'position:relative;';
  thumbWrap.appendChild(canvas);
  thumbWrap.appendChild(notch);

  card.appendChild(thumbWrap);
  card.appendChild(info);
  grid.appendChild(card);
});
</script>
