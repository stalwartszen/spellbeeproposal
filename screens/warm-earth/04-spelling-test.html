<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Test · Warm Earth</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#1A0D04;width:390px;height:844px;overflow:hidden;position:relative;}
.bg-glow{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
.tile{width:38px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.1rem;border:1.5px solid rgba(255,154,0,0.25);background:#2D1508;color:rgba(255,242,220,0.9);}
.tile.filled{background:rgba(255,154,0,0.18);border-color:#FF9A00;color:#FF9A00;}
.tile.empty{background:rgba(255,218,170,0.04);border-style:dashed;}
.key{background:#2D1508;border:1px solid rgba(255,154,0,0.2);border-radius:8px;padding:0;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'Fredoka One',cursive;font-size:0.85rem;color:rgba(255,242,220,0.8);}
</style>
</head>
<body>

<div class="bg-glow" style="width:300px;height:300px;background:rgba(255,107,53,0.1);top:-80px;right:-60px;"></div>
<div class="bg-glow" style="width:250px;height:250px;background:rgba(255,154,0,0.07);bottom:100px;left:-50px;"></div>

<!-- Notch -->
<div style="width:120px;height:34px;background:#1A0D04;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10;"></div>

<div style="padding:48px 20px 24px;height:100%;display:flex;flex-direction:column;position:relative;z-index:1;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <button style="width:38px;height:38px;background:rgba(255,154,0,0.1);border:1px solid rgba(255,154,0,0.2);border-radius:50%;cursor:pointer;color:rgba(255,218,170,0.7);font-size:1rem;">←</button>
    <div style="font-family:'Fredoka One',cursive;font-size:1rem;color:rgba(255,242,220,0.9);">Spelling Test</div>
    <div style="background:rgba(255,107,53,0.15);border:1px solid rgba(255,107,53,0.3);border-radius:20px;padding:4px 12px;">
      <span style="font-size:0.72rem;font-weight:700;color:#FF6B35;">Q 4/10</span>
    </div>
  </div>

  <!-- Progress -->
  <div style="height:6px;background:rgba(255,154,0,0.1);border-radius:6px;overflow:hidden;margin-bottom:20px;">
    <div style="width:40%;height:100%;background:linear-gradient(90deg,#FF9A00,#FF6B35);border-radius:6px;"></div>
  </div>

  <!-- Timer + Audio -->
  <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:24px;">
    <!-- Timer ring -->
    <div style="position:relative;width:68px;height:68px;">
      <svg width="68" height="68" style="transform:rotate(-90deg)">
        <circle cx="34" cy="34" r="28" fill="none" stroke="rgba(255,107,53,0.15)" stroke-width="5"/>
        <circle cx="34" cy="34" r="28" fill="none" stroke="#FF6B35" stroke-width="5" stroke-dasharray="176" stroke-dashoffset="62"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.05rem;color:rgba(255,242,220,0.9);">0:23</div>
    </div>

    <!-- Audio button -->
    <div style="width:64px;height:64px;background:rgba(255,154,0,0.14);border:1.5px solid rgba(255,154,0,0.3);border-radius:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.8rem;">🔊</div>
  </div>

  <!-- Word hint -->
  <div style="text-align:center;margin-bottom:20px;">
    <div style="font-size:0.72rem;color:rgba(255,218,170,0.4);font-weight:600;letter-spacing:0.08em;margin-bottom:6px;">LISTEN AND SPELL</div>
    <div style="font-size:0.78rem;color:rgba(255,218,170,0.55);font-style:italic;">"She showed great _____ in finishing the race."</div>
  </div>

  <!-- Letter tiles -->
  <div style="display:flex;justify-content:center;gap:6px;margin-bottom:24px;flex-wrap:wrap;">
    <div class="tile filled">P</div>
    <div class="tile filled">E</div>
    <div class="tile filled">R</div>
    <div class="tile filled">S</div>
    <div class="tile filled">E</div>
    <div class="tile filled">V</div>
    <div class="tile empty"></div>
    <div class="tile empty"></div>
    <div class="tile empty"></div>
    <div class="tile empty"></div>
    <div class="tile empty"></div>
    <div class="tile empty"></div>
  </div>

  <!-- Keyboard -->
  <div style="flex:1;display:flex;flex-direction:column;gap:6px;justify-content:center;">
    <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px;">
      <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div><div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(9,1fr);gap:4px;padding:0 10px;">
      <div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div><div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key">L</div>
    </div>
    <div style="display:grid;grid-template-columns:1.5fr repeat(7,1fr) 1.5fr;gap:4px;">
      <div class="key" style="font-size:0.72rem;">⇧</div>
      <div class="key">Z</div><div class="key">X</div><div class="key">C</div><div class="key">V</div><div class="key">B</div><div class="key">N</div><div class="key">M</div>
      <div class="key" style="font-size:0.72rem;">⌫</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 2fr 1fr;gap:4px;">
      <div class="key" style="font-size:0.65rem;">123</div>
      <div class="key" style="background:rgba(255,154,0,0.1);">space</div>
      <div class="key" style="font-size:0.65rem;">↵</div>
    </div>
  </div>

  <!-- Submit -->
  <button style="width:100%;padding:14px;background:linear-gradient(135deg,#FF9A00,#FF6B35);border:none;border-radius:16px;font-family:'Fredoka One',cursive;font-size:1.05rem;color:#fff;cursor:pointer;margin-top:12px;box-shadow:0 6px 20px rgba(255,154,0,0.3);">Submit Answer 🍯</button>
</div>
</body>
</html>
