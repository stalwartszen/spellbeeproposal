<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Word Learning · Warm Earth</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#1A0D04;width:390px;height:844px;overflow:hidden;position:relative;}
.bg-glow{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
.option{background:#2D1508;border:1.5px solid rgba(255,154,0,0.15);border-radius:16px;padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.option.correct{background:rgba(255,154,0,0.15);border-color:#FF9A00;}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:rgba(26,13,4,0.96);backdrop-filter:blur(20px);border-top:1px solid rgba(255,154,0,0.1);padding:10px 0 20px;display:flex;align-items:center;justify-content:space-around;}
.nav-label{font-size:0.6rem;font-weight:700;color:rgba(255,218,170,0.35);}
</style>
</head>
<body>

<div class="bg-glow" style="width:350px;height:350px;background:rgba(255,154,0,0.09);top:-80px;left:-60px;"></div>
<div class="bg-glow" style="width:250px;height:250px;background:rgba(255,107,53,0.07);bottom:80px;right:-40px;"></div>

<!-- Notch -->
<div style="width:120px;height:34px;background:#1A0D04;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10;"></div>

<div style="padding:48px 20px 84px;height:100%;overflow-y:auto;position:relative;z-index:1;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <button style="width:38px;height:38px;background:rgba(255,154,0,0.1);border:1px solid rgba(255,154,0,0.2);border-radius:50%;cursor:pointer;color:rgba(255,218,170,0.7);font-size:1rem;">←</button>
    <div style="font-family:'Fredoka One',cursive;font-size:1rem;color:rgba(255,242,220,0.9);">Word Learning</div>
    <div style="background:rgba(255,154,0,0.15);border:1px solid rgba(255,154,0,0.3);border-radius:20px;padding:4px 10px;">
      <span style="font-size:0.72rem;font-weight:700;color:#FF9A00;">+10 XP</span>
    </div>
  </div>

  <!-- Progress -->
  <div style="height:6px;background:rgba(255,154,0,0.12);border-radius:6px;overflow:hidden;margin-bottom:20px;">
    <div style="width:40%;height:100%;background:linear-gradient(90deg,#FF9A00,#FF6B35);border-radius:6px;"></div>
  </div>
  <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
    <span style="font-size:0.7rem;color:rgba(255,154,0,0.7);font-weight:700;">4 / 10</span>
    <span style="font-size:0.7rem;color:rgba(255,218,170,0.4);">Grade 3</span>
  </div>

  <!-- Word card -->
  <div style="background:linear-gradient(135deg,rgba(255,154,0,0.12),rgba(255,107,53,0.07));border:1px solid rgba(255,154,0,0.25);border-radius:24px;padding:28px 24px;text-align:center;margin-bottom:20px;">
    <div style="width:60px;height:60px;background:rgba(255,154,0,0.18);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.8rem;">🔊</div>
    <div style="font-family:'Fredoka One',cursive;font-size:1.9rem;color:rgba(255,242,220,0.95);margin-bottom:6px;letter-spacing:2px;">PERSEVERANCE</div>
    <div style="font-size:0.78rem;color:rgba(255,218,170,0.45);margin-bottom:14px;">/pər·sev·ər·əns/</div>
    <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,154,0,0.12);border:1px solid rgba(255,154,0,0.2);border-radius:20px;padding:5px 14px;">
      <span style="font-size:0.72rem;font-weight:700;color:#FF9A00;">noun</span>
    </div>
  </div>

  <!-- Definition label -->
  <div style="font-size:0.72rem;font-weight:700;color:rgba(255,218,170,0.4);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;">Choose the correct meaning:</div>

  <!-- Options -->
  <div style="display:flex;flex-direction:column;gap:8px;">
    <div class="option">
      <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,154,0,0.1);border:1.5px solid rgba(255,154,0,0.25);display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:rgba(255,218,170,0.6);font-weight:700;flex-shrink:0;">A</div>
      <span style="font-size:0.85rem;color:rgba(255,218,170,0.7);">Giving up quickly on a task</span>
    </div>
    <div class="option correct">
      <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,154,0,0.25);border:1.5px solid #FF9A00;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:#FF9A00;font-weight:700;flex-shrink:0;">B</div>
      <span style="font-size:0.85rem;color:rgba(255,242,220,0.9);font-weight:600;">Continuing despite difficulty</span>
      <span style="margin-left:auto;font-size:1rem;">✓</span>
    </div>
    <div class="option">
      <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,154,0,0.1);border:1.5px solid rgba(255,154,0,0.25);display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:rgba(255,218,170,0.6);font-weight:700;flex-shrink:0;">C</div>
      <span style="font-size:0.85rem;color:rgba(255,218,170,0.7);">A type of ancient ritual</span>
    </div>
    <div class="option">
      <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,154,0,0.1);border:1.5px solid rgba(255,154,0,0.25);display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:rgba(255,218,170,0.6);font-weight:700;flex-shrink:0;">D</div>
      <span style="font-size:0.85rem;color:rgba(255,218,170,0.7);">A musical performance style</span>
    </div>
  </div>

  <div style="margin-top:16px;">
    <button style="width:100%;padding:14px;background:linear-gradient(135deg,#FF9A00,#FF6B35);border:none;border-radius:16px;font-family:'Fredoka One',cursive;font-size:1rem;color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(255,154,0,0.3);">Next Word →</button>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.2rem;">🏠</span><span class="nav-label">Home</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.2rem;">📖</span><span class="nav-label" style="color:#FF9A00;">Learn</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.2rem;">✏️</span><span class="nav-label">Test</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.2rem;">📊</span><span class="nav-label">Progress</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;"><span style="font-size:1.2rem;">👤</span><span class="nav-label">Profile</span></div>
</div>
</body>
</html>
