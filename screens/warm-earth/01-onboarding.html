<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Onboarding · Warm Earth</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#1A0D04;width:390px;height:844px;overflow:hidden;position:relative;}
.bg-glow{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
.card{background:#2D1508;border:1px solid rgba(255,154,0,0.18);border-radius:20px;padding:16px 18px;}
.grade-btn{background:#2D1508;border:1.5px solid rgba(255,154,0,0.2);border-radius:16px;padding:14px 10px;text-align:center;cursor:pointer;transition:all 0.2s;}
.grade-btn.sel{background:rgba(255,154,0,0.18);border-color:#FF9A00;}
.progress-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,154,0,0.25);}
.progress-dot.active{background:#FF9A00;width:22px;border-radius:4px;}
</style>
</head>
<body>

<div class="bg-glow" style="width:400px;height:400px;background:rgba(255,154,0,0.09);top:-150px;right:-100px;"></div>
<div class="bg-glow" style="width:300px;height:300px;background:rgba(255,107,53,0.07);bottom:0;left:-80px;"></div>

<!-- Notch -->
<div style="width:120px;height:34px;background:#1A0D04;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10;"></div>

<div style="padding:52px 24px 24px;height:100%;display:flex;flex-direction:column;">

  <!-- Progress -->
  <div style="display:flex;gap:6px;align-items:center;margin-bottom:32px;">
    <div class="progress-dot active"></div>
    <div class="progress-dot active"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
  </div>

  <!-- Title -->
  <div style="margin-bottom:28px;">
    <div style="font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,154,0,0.7);margin-bottom:8px;">Step 2 of 4</div>
    <h1 style="font-family:'Fredoka One',cursive;font-size:2rem;color:rgba(255,242,220,0.92);line-height:1.2;margin-bottom:8px;">Which grade are<br>you in? 📚</h1>
    <p style="font-size:0.85rem;color:rgba(255,218,170,0.6);line-height:1.6;">We'll pick the perfect words just for you!</p>
  </div>

  <!-- Grade grid -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:24px;">
    <div class="grade-btn">
      <div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:rgba(255,242,220,0.7);">1</div>
      <div style="font-size:0.58rem;color:rgba(255,218,170,0.5);margin-top:2px;">Grade</div>
    </div>
    <div class="grade-btn">
      <div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:rgba(255,242,220,0.7);">2</div>
      <div style="font-size:0.58rem;color:rgba(255,218,170,0.5);margin-top:2px;">Grade</div>
    </div>
    <div class="grade-btn sel">
      <div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:#FF9A00;">3</div>
      <div style="font-size:0.58rem;color:rgba(255,154,0,0.7);margin-top:2px;">Grade</div>
    </div>
    <div class="grade-btn">
      <div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:rgba(255,242,220,0.7);">4</div>
      <div style="font-size:0.58rem;color:rgba(255,218,170,0.5);margin-top:2px;">Grade</div>
    </div>
    <div class="grade-btn">
      <div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:rgba(255,242,220,0.7);">5</div>
      <div style="font-size:0.58rem;color:rgba(255,218,170,0.5);margin-top:2px;">Grade</div>
    </div>
    <div class="grade-btn">
      <div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:rgba(255,242,220,0.7);">6</div>
      <div style="font-size:0.58rem;color:rgba(255,218,170,0.5);margin-top:2px;">Grade</div>
    </div>
    <div class="grade-btn">
      <div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:rgba(255,242,220,0.7);">7</div>
      <div style="font-size:0.58rem;color:rgba(255,218,170,0.5);margin-top:2px;">Grade</div>
    </div>
    <div class="grade-btn">
      <div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:rgba(255,242,220,0.7);">8</div>
      <div style="font-size:0.58rem;color:rgba(255,218,170,0.5);margin-top:2px;">Grade</div>
    </div>
  </div>

  <!-- Selected info card -->
  <div class="card" style="margin-bottom:24px;display:flex;align-items:center;gap:14px;">
    <div style="width:44px;height:44px;background:rgba(255,154,0,0.18);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;">📖</div>
    <div>
      <div style="font-family:'Fredoka One',cursive;font-size:0.95rem;color:rgba(255,242,220,0.9);">Grade 3 — Selected</div>
      <div style="font-size:0.75rem;color:rgba(255,218,170,0.55);margin-top:2px;">~180 curated words · Medium difficulty</div>
    </div>
  </div>

  <div style="flex:1;"></div>

  <!-- CTA -->
  <button style="width:100%;padding:16px;background:linear-gradient(135deg,#FF9A00,#FF6B35);border:none;border-radius:18px;font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff;cursor:pointer;letter-spacing:0.5px;box-shadow:0 8px 24px rgba(255,154,0,0.35);">
    Continue 🍯
  </button>

  <p style="text-align:center;font-size:0.7rem;color:rgba(255,218,170,0.35);margin-top:12px;">You can always change this in settings</p>
</div>
</body>
</html>
