<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Results · Warm Earth</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#1A0D04;width:390px;height:844px;overflow:hidden;position:relative;}
.bg-glow{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
.card{background:#2D1508;border:1px solid rgba(255,154,0,0.14);border-radius:20px;padding:16px 18px;}
.confetti{position:absolute;font-size:1.2rem;animation:fall 3s ease-in-out infinite;}
@keyframes fall{0%,100%{transform:translateY(0) rotate(0deg);opacity:1;}50%{transform:translateY(10px) rotate(15deg);opacity:0.7;}}
</style>
</head>
<body>

<div class="bg-glow" style="width:420px;height:420px;background:rgba(255,154,0,0.1);top:-140px;left:50%;transform:translateX(-50%);"></div>
<div class="bg-glow" style="width:280px;height:280px;background:rgba(255,107,53,0.07);bottom:80px;right:-60px;"></div>

<!-- Confetti -->
<span class="confetti" style="top:60px;left:30px;animation-delay:0s;">🎉</span>
<span class="confetti" style="top:80px;right:40px;animation-delay:0.5s;">⭐</span>
<span class="confetti" style="top:50px;left:50%;animation-delay:1s;">🍯</span>
<span class="confetti" style="top:100px;left:15%;animation-delay:0.3s;">✨</span>
<span class="confetti" style="top:70px;right:20%;animation-delay:0.8s;">🌟</span>

<!-- Notch -->
<div style="width:120px;height:34px;background:#1A0D04;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10;"></div>

<div style="padding:52px 20px 24px;height:100%;display:flex;flex-direction:column;position:relative;z-index:1;">

  <!-- Header -->
  <div style="text-align:center;margin-bottom:24px;">
    <div style="font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,154,0,0.65);margin-bottom:6px;">Test Complete!</div>
    <div style="font-family:'Fredoka One',cursive;font-size:1.6rem;color:rgba(255,242,220,0.92);">Excellent Work! 🎊</div>
  </div>

  <!-- Score ring -->
  <div style="display:flex;justify-content:center;margin-bottom:24px;position:relative;">
    <div style="position:relative;width:120px;height:120px;">
      <svg width="120" height="120" style="transform:rotate(-90deg)">
        <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,154,0,0.12)" stroke-width="10"/>
        <circle cx="60" cy="60" r="52" fill="none" stroke="url(#warmGrad)" stroke-width="10" stroke-dasharray="327" stroke-dashoffset="49" stroke-linecap="round"/>
        <defs>
          <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FF9A00"/>
            <stop offset="100%" stop-color="#FF6B35"/>
          </linearGradient>
        </defs>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <div style="font-family:'Fredoka One',cursive;font-size:2rem;color:#FF9A00;line-height:1;">8</div>
        <div style="font-size:0.65rem;color:rgba(255,218,170,0.5);margin-top:2px;">out of 10</div>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;">
    <div class="card" style="text-align:center;padding:14px 10px;background:rgba(125,168,123,0.1);border-color:rgba(125,168,123,0.25);">
      <div style="font-family:'Fredoka One',cursive;font-size:1.5rem;color:#7DA87B;">8</div>
      <div style="font-size:0.62rem;color:rgba(125,168,123,0.7);margin-top:2px;">Correct</div>
    </div>
    <div class="card" style="text-align:center;padding:14px 10px;background:rgba(255,107,53,0.1);border-color:rgba(255,107,53,0.25);">
      <div style="font-family:'Fredoka One',cursive;font-size:1.5rem;color:#FF6B35;">1</div>
      <div style="font-size:0.62rem;color:rgba(255,107,53,0.7);margin-top:2px;">Wrong</div>
    </div>
    <div class="card" style="text-align:center;padding:14px 10px;background:rgba(255,217,61,0.1);border-color:rgba(255,217,61,0.25);">
      <div style="font-family:'Fredoka One',cursive;font-size:1.5rem;color:#FFD93D;">1</div>
      <div style="font-size:0.62rem;color:rgba(255,217,61,0.7);margin-top:2px;">Skipped</div>
    </div>
  </div>

  <!-- XP earned -->
  <div style="background:linear-gradient(135deg,rgba(255,154,0,0.16),rgba(255,107,53,0.1));border:1.5px solid rgba(255,154,0,0.3);border-radius:20px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-size:0.68rem;color:rgba(255,218,170,0.5);font-weight:600;margin-bottom:4px;">XP EARNED</div>
      <div style="font-family:'Fredoka One',cursive;font-size:1.6rem;color:#FF9A00;">+120 XP</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:0.68rem;color:rgba(255,218,170,0.45);margin-bottom:4px;">Accuracy Bonus</div>
      <div style="font-family:'Fredoka One',cursive;font-size:1rem;color:#FFD93D;">+20 XP</div>
    </div>
  </div>

  <!-- Review card -->
  <div class="card" style="margin-bottom:16px;">
    <div style="font-size:0.72rem;font-weight:700;color:rgba(255,218,170,0.45);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;">Words to Review</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.2);border-radius:10px;">
        <span style="font-family:'Fredoka One',cursive;font-size:0.85rem;color:rgba(255,242,220,0.85);">Ephemeral</span>
        <span style="font-size:0.68rem;color:#FF6B35;font-weight:700;">Wrong</span>
      </div>
    </div>
  </div>

  <div style="flex:1;"></div>

  <!-- Buttons -->
  <div style="display:flex;gap:10px;">
    <button style="flex:1;padding:14px;background:#2D1508;border:1.5px solid rgba(255,154,0,0.25);border-radius:16px;font-family:'Fredoka One',cursive;font-size:0.9rem;color:rgba(255,242,220,0.8);cursor:pointer;">Review</button>
    <button style="flex:2;padding:14px;background:linear-gradient(135deg,#FF9A00,#FF6B35);border:none;border-radius:16px;font-family:'Fredoka One',cursive;font-size:0.95rem;color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(255,154,0,0.3);">Next Test 🍯</button>
  </div>
</div>
</body>
</html>
