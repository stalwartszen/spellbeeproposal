<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee ┬Ę Spelling Test</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #0A0818; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes ripple { 0% { transform:scale(0.8); opacity:1; } 100% { transform:scale(2.5); opacity:0; } }
  @keyframes timerRing { from { stroke-dashoffset:0; } to { stroke-dashoffset:var(--dashEnd); } }
  @keyframes tileIn { 0% { transform:scale(0) rotate(10deg); opacity:0; } 100% { transform:scale(1) rotate(0); opacity:1; } }
  @keyframes shake { 0%,100% { transform:translateX(0); } 20%,60% { transform:translateX(-4px); } 40%,80% { transform:translateX(4px); } }
  @keyframes pulse { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.08); opacity:0.9; } }
  @keyframes keyPress { 0% { transform:scale(1); } 50% { transform:scale(0.9); } 100% { transform:scale(1); } }
  .fade-up { opacity:0; animation: fadeUp 0.5s ease forwards; }
  .notch { width:120px; height:34px; background:#0A0818; border-radius:0 0 20px 20px; position:absolute; top:0; left:50%; transform:translateX(-50%); z-index:10; }
  .bottom-nav { position:absolute; bottom:0; left:0; right:0; background:rgba(15,13,42,0.95); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.06); padding:10px 0 20px; display:flex; align-items:center; justify-content:space-around; }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:4px 12px; }
  .nav-icon { font-size:1.3rem; }
  .nav-label { font-size:0.6rem; font-weight:600; color:rgba(255,255,255,0.4); }
  .tile { width:28px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; font-size:0.85rem; font-weight:700; color:#fff; border:1.5px solid rgba(255,255,255,0.15); background:#231F55; transition:all 0.15s ease; }
  .tile.filled { background:rgba(108,99,255,0.25); border-color:#6C63FF; color:#fff; animation:tileIn 0.2s ease; }
  .tile.current { border-color:#6C63FF; background:rgba(108,99,255,0.1); box-shadow:0 0 0 2px rgba(108,99,255,0.3); animation:pulse 1.5s infinite; }
  .key { background:#231F55; border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:rgba(255,255,255,0.85); font-size:0.8rem; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; padding:8px 4px; text-align:center; transition:all 0.15s; min-width:28px; }
  .key:hover { background:rgba(108,99,255,0.25); border-color:#6C63FF; transform:scale(1.05); }
  .key:active { animation:keyPress 0.1s ease; background:#6C63FF; }
  .key.wide { padding:8px 12px; font-size:0.7rem; }
  .audio-btn { width:80px; height:80px; background:rgba(0,200,150,0.12); border:2px solid rgba(0,200,150,0.4); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; font-size:2rem; transition:transform 0.2s; }
  .audio-btn:hover { transform:scale(1.05); background:rgba(0,200,150,0.2); }
  .ripple-ring { position:absolute; inset:-6px; border-radius:50%; border:2px solid rgba(0,200,150,0.4); animation:ripple 2s ease-out infinite; }
  .ripple-ring:nth-child(2) { animation-delay:0.8s; }
  .hint-btn { background:transparent; border:1.5px solid rgba(255,255,255,0.15); border-radius:12px; padding:10px 20px; color:rgba(255,255,255,0.5); font-size:0.85rem; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; }
  .hint-btn:hover { border-color:rgba(245,166,35,0.5); color:#F5A623; }
</style>
</head>
<body>
<div style="width:390px; height:844px; background:#0F0D2A; border-radius:40px; position:relative; overflow:hidden; box-shadow:0 30px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.08); flex-shrink:0;">

  <div class="notch"></div>

  <!-- BG glow -->
  <div style="position:absolute;top:0;left:0;right:0;height:300px;background:radial-gradient(ellipse at 50% -20%,rgba(255,92,53,0.12) 0%,transparent 70%);pointer-events:none;"></div>

  <div style="height:calc(100% - 74px); overflow-y:auto; padding:44px 20px 16px;">

    <!-- Top Bar -->
    <div class="fade-up" style="animation-delay:0ms; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <button style="width:38px;height:38px;background:rgba(255,255,255,0.06);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;">ŌåÉ</button>
      <div style="font-weight:700;font-size:1rem;color:#fff;">Spelling Test</div>
      <div style="background:rgba(255,92,53,0.15);border:1px solid rgba(255,92,53,0.3);border-radius:20px;padding:5px 12px;">
        <span style="font-size:0.75rem;font-weight:700;color:#FF5C35;">Q 3 / 10</span>
      </div>
    </div>

    <!-- Timer Ring + Audio -->
    <div class="fade-up" style="animation-delay:100ms; display:flex; align-items:center; justify-content:center; gap:32px; margin-bottom:20px;">

      <!-- Timer Ring -->
      <div style="position:relative;width:80px;height:80px;flex-shrink:0;">
        <svg width="80" height="80" style="transform:rotate(-90deg);">
          <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,92,53,0.15)" stroke-width="6"/>
          <circle id="timerRing" cx="40" cy="40" r="34" fill="none" stroke="#FF5C35" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="213.6" stroke-dashoffset="0"
            style="transition:stroke-dashoffset 1s linear;"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span id="timerDisplay" style="font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:#FF5C35;">0:23</span>
          <span style="font-size:0.55rem;color:rgba(255,255,255,0.4);margin-top:1px;">left</span>
        </div>
      </div>

      <!-- Audio Button -->
      <div class="audio-btn" onclick="playWord()">
        <div class="ripple-ring"></div>
        <div class="ripple-ring"></div>
        ­¤öŖ
      </div>

      <!-- Stats mini -->
      <div style="text-align:center;flex-shrink:0;">
        <div style="font-size:1.5rem;font-weight:700;color:#F5A623;font-family:'Space Mono',monospace;">2├Ś</div>
        <div style="font-size:0.6rem;color:rgba(245,166,35,0.7);font-weight:600;text-transform:uppercase;">Combo</div>
      </div>
    </div>

    <!-- Instruction -->
    <div class="fade-up" style="animation-delay:150ms; text-align:center; margin-bottom:16px;">
      <p style="font-size:0.85rem;color:rgba(255,255,255,0.5);">Listen and spell the word you hear</p>
    </div>

    <!-- Letter Tiles -->
    <div class="fade-up" style="animation-delay:200ms; margin-bottom:16px;">
      <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;" id="tileRow">
      </div>
    </div>

    <!-- Spacer word hint -->
    <div class="fade-up" style="animation-delay:250ms; text-align:center; margin-bottom:16px;">
      <span style="font-size:0.72rem;color:rgba(255,255,255,0.25);letter-spacing:3px;">P E R S _ _ _ E R A N C E</span>
    </div>

    <!-- Keyboard -->
    <div class="fade-up" style="animation-delay:300ms;" id="keyboard">
    </div>

    <!-- Action Buttons -->
    <div class="fade-up" style="animation-delay:400ms; display:flex; gap:10px; margin-top:12px;">
      <button class="hint-btn" onclick="useHint()">­¤ÆĪ Hint (-5 XP)</button>
      <button onclick="submitAnswer()" style="flex:1;padding:12px;border-radius:14px;background:#FF5C35;border:none;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 20px rgba(255,92,53,0.4);" onmouseenter="this.style.transform='translateY(-2px)'" onmouseleave="this.style.transform=''">
        SUBMIT Ō£ō
      </button>
    </div>

    <!-- Progress dots -->
    <div class="fade-up" style="animation-delay:450ms; display:flex; gap:4px; justify-content:center; margin-top:16px;">
      <div style="width:20px;height:4px;border-radius:2px;background:#00C896;"></div>
      <div style="width:20px;height:4px;border-radius:2px;background:#00C896;"></div>
      <div style="width:20px;height:4px;border-radius:2px;background:#6C63FF;"></div>
      <div style="width:20px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:20px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:20px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:20px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:20px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:20px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
      <div style="width:20px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item"><span class="nav-icon">­¤ÅĀ</span><span class="nav-label">Home</span></div>
    <div class="nav-item"><span class="nav-icon">­¤ō¢</span><span class="nav-label">Learn</span></div>
    <div class="nav-item active"><span class="nav-icon">Ō£Å’ĖÅ</span><span class="nav-label" style="color:#FF5C35;">Test</span></div>
    <div class="nav-item"><span class="nav-icon">­¤Åå</span><span class="nav-label">Ranks</span></div>
    <div class="nav-item"><span class="nav-icon">­¤æż</span><span class="nav-label">Profile</span></div>
  </div>
</div>

<script>
// Build tiles
const word = 'PERSEVERANCE';
const revealed = [0,1,2,3,8,9,10,11]; // P,E,R,S revealed; A,N,C,E revealed
const tileRow = document.getElementById('tileRow');
const typedLetters = ['P','E','R','S','','','','E','R','A','N','C','E'];

word.split('').forEach((letter, i) => {
  const tile = document.createElement('div');
  tile.className = 'tile' + (typedLetters[i] ? ' filled' : (i===4 ? ' current' : ''));
  tile.textContent = typedLetters[i] || '';
  tile.id = 'tile-'+i;
  tileRow.appendChild(tile);
});

// Build keyboard
const rows = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['Ōī½','Z','X','C','V','B','N','M','ŌåĄ']
];
const kb = document.getElementById('keyboard');
rows.forEach(row => {
  const rowEl = document.createElement('div');
  rowEl.style.cssText = 'display:flex;gap:4px;justify-content:center;margin-bottom:5px;';
  row.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'key' + (k==='Ōī½'||k==='ŌåĄ' ? ' wide' : '');
    btn.textContent = k;
    btn.style.flex = '1';
    btn.onclick = () => pressKey(k);
    rowEl.appendChild(btn);
  });
  kb.appendChild(rowEl);
});

let currentPos = 4;
function pressKey(k) {
  if(k === 'Ōī½') {
    if(currentPos > 4) {
      currentPos--;
      document.getElementById('tile-'+currentPos).textContent = '';
      document.getElementById('tile-'+currentPos).className = 'tile current';
      document.getElementById('tile-'+(currentPos+1))?.classList.remove('current');
    }
  } else if(k === 'ŌåĄ') {
    submitAnswer();
  } else if(currentPos < word.length && currentPos >= 4 && currentPos <= 7) {
    document.getElementById('tile-'+currentPos).textContent = k;
    document.getElementById('tile-'+currentPos).className = 'tile filled';
    currentPos++;
    if(currentPos < word.length && currentPos <= 7) {
      document.getElementById('tile-'+currentPos).className = 'tile current';
    }
  }
}

// Timer countdown
let timeLeft = 23;
const totalTime = 30;
const ring = document.getElementById('timerRing');
const circumference = 213.6;

function updateTimer() {
  const display = document.getElementById('timerDisplay');
  const mins = Math.floor(timeLeft/60);
  const secs = timeLeft%60;
  display.textContent = mins+':'+(secs<10?'0':'')+secs;
  const dashOffset = circumference * (1 - timeLeft/totalTime);
  ring.style.strokeDashoffset = dashOffset;
  if(timeLeft <= 5) { ring.style.stroke='#FF5C35'; display.style.color='#FF5C35'; }
  if(timeLeft <= 0) return;
  timeLeft--;
  setTimeout(updateTimer, 1000);
}
updateTimer();

function playWord() {
  const btn = document.querySelector('.audio-btn');
  btn.style.background='rgba(0,200,150,0.3)';
  setTimeout(()=>btn.style.background='rgba(0,200,150,0.12)',600);
}

function submitAnswer() {
  const tiles = document.querySelectorAll('.tile');
  tiles.forEach(t => { t.style.background='rgba(0,200,150,0.2)'; t.style.borderColor='#00C896'; });
  setTimeout(()=>{ tiles.forEach(t=>{ t.style.background=''; t.style.borderColor=''; }); }, 1000);
}

function useHint() {
  const hintTile = document.getElementById('tile-4');
  if(hintTile && !hintTile.textContent) { hintTile.textContent='V'; hintTile.className='tile filled'; currentPos=5; document.getElementById('tile-5').className='tile current'; }
}
</script>
</body>
</html>
