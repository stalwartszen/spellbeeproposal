<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bee · Leaderboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #0A0818; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes growUp { from { height:0; } to { height:var(--h); } }
  @keyframes glowPulse { 0%,100%{box-shadow:0 0 10px rgba(245,166,35,0.3);} 50%{box-shadow:0 0 25px rgba(245,166,35,0.7);} }
  @keyframes rankBadge { 0%{transform:scale(0) rotate(-15deg);} 80%{transform:scale(1.1) rotate(5deg);} 100%{transform:scale(1) rotate(0);} }
  .fade-up { opacity:0; animation: fadeUp 0.5s ease forwards; }
  .notch { width:120px; height:34px; background:#0A0818; border-radius:0 0 20px 20px; position:absolute; top:0; left:50%; transform:translateX(-50%); z-index:10; }
  .bottom-nav { position:absolute; bottom:0; left:0; right:0; background:rgba(15,13,42,0.95); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.06); padding:10px 0 20px; display:flex; align-items:center; justify-content:space-around; }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:4px 12px; }
  .nav-icon { font-size:1.3rem; }
  .nav-label { font-size:0.6rem; font-weight:600; color:rgba(255,255,255,0.4); }
  .tab { flex:1; padding:10px; text-align:center; font-size:0.8rem; font-weight:600; cursor:pointer; border-radius:12px; transition:all 0.2s; }
  .tab.active { background:#6C63FF; color:#fff; }
  .tab.inactive { color:rgba(255,255,255,0.5); }
  .avatar { border-radius:50%; display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:0.85rem;flex-shrink:0; }
  .rank-row { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:14px; margin-bottom:6px; transition:all 0.2s; cursor:pointer; }
  .rank-row:hover { background:#231F55; }
  .rank-row.me { background:rgba(108,99,255,0.15); border:1.5px solid rgba(108,99,255,0.4); }
  .medal { width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;font-family:'Space Mono',monospace;flex-shrink:0; }
  .podium-bar { border-radius:8px 8px 0 0; width:100%; transition:height 1.2s cubic-bezier(0.4,0,0.2,1); }
</style>
</head>
<body>
<div style="width:390px; height:844px; background:#0F0D2A; border-radius:40px; position:relative; overflow:hidden; box-shadow:0 30px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.08); flex-shrink:0;">

  <div class="notch"></div>
  <div style="position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(245,166,35,0.08) 0%,transparent 70%);pointer-events:none;"></div>

  <div style="height:calc(100% - 74px); overflow-y:auto; padding:44px 20px 20px;">

    <!-- Top Bar -->
    <div class="fade-up" style="animation-delay:0ms; display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
      <button style="width:38px;height:38px;background:rgba(255,255,255,0.06);border:none;border-radius:50%;cursor:pointer;color:#fff;font-size:1rem;">←</button>
      <div style="font-weight:700;font-size:1rem;color:#fff;">Leaderboard</div>
      <div style="background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.3);border-radius:20px;padding:5px 12px;">
        <span style="font-size:0.75rem;font-weight:700;color:#F5A623;">Season 3</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="fade-up" style="animation-delay:50ms; background:#1A1740; border-radius:16px; padding:4px; display:flex; gap:4px; margin-bottom:24px;">
      <div class="tab active" onclick="switchTab(this,'Class')">Class</div>
      <div class="tab inactive" onclick="switchTab(this,'School')">School</div>
      <div class="tab inactive" onclick="switchTab(this,'National')">National</div>
    </div>

    <!-- Podium -->
    <div class="fade-up" style="animation-delay:200ms; margin-bottom:24px;">
      <div style="display:flex;align-items:flex-end;justify-content:center;gap:8px;height:200px;">

        <!-- 2nd Place -->
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:0;">
          <div style="font-size:0.75rem;font-weight:700;color:#fff;margin-bottom:4px;" id="name2">Rahul K.</div>
          <div style="position:relative;">
            <div class="avatar" style="width:52px;height:52px;background:linear-gradient(135deg,#8B8B8B,#C0C0C0);margin-bottom:4px;font-size:1rem;">RK</div>
            <div style="position:absolute;bottom:0;right:-4px;width:22px;height:22px;background:linear-gradient(135deg,#C0C0C0,#a8a8a8);border-radius:50%;border:2px solid #0F0D2A;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;">2</div>
          </div>
          <div id="xp2" style="font-family:'Space Mono',monospace;font-size:0.75rem;color:#a0a0a0;margin-bottom:4px;">0</div>
          <div class="podium-bar" style="background:linear-gradient(180deg,#C0C0C0,#a8a8a8);height:0;--h:100px;" id="bar2"></div>
        </div>

        <!-- 1st Place -->
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
          <div style="background:rgba(245,166,35,0.2);border-radius:20px;padding:3px 10px;margin-bottom:6px;">
            <span style="font-size:0.65rem;font-weight:700;color:#F5A623;">👑 CHAMPION</span>
          </div>
          <div style="font-size:0.8rem;font-weight:700;color:#fff;margin-bottom:4px;" id="name1">Aryan S.</div>
          <div style="position:relative;">
            <div class="avatar" style="width:60px;height:60px;background:linear-gradient(135deg,#F5A623,#FF8C00);margin-bottom:4px;font-size:1.2rem;box-shadow:0 0 20px rgba(245,166,35,0.5);animation:glowPulse 2s infinite;">AS</div>
            <div style="position:absolute;bottom:0;right:-4px;width:26px;height:26px;background:linear-gradient(135deg,#F5A623,#FF8C00);border-radius:50%;border:2px solid #0F0D2A;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:#0A0818;">1</div>
          </div>
          <div id="xp1" style="font-family:'Space Mono',monospace;font-size:0.85rem;color:#F5A623;font-weight:700;margin-bottom:4px;">0</div>
          <div class="podium-bar" style="background:linear-gradient(180deg,#F5A623,#FF8C00);height:0;--h:140px;" id="bar1"></div>
        </div>

        <!-- 3rd Place -->
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
          <div style="font-size:0.75rem;font-weight:700;color:#fff;margin-bottom:4px;" id="name3">Priya M.</div>
          <div style="position:relative;">
            <div class="avatar" style="width:52px;height:52px;background:linear-gradient(135deg,#CD7F32,#a0522d);margin-bottom:4px;font-size:1rem;">PM</div>
            <div style="position:absolute;bottom:0;right:-4px;width:22px;height:22px;background:linear-gradient(135deg,#CD7F32,#a0522d);border-radius:50%;border:2px solid #0F0D2A;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;">3</div>
          </div>
          <div id="xp3" style="font-family:'Space Mono',monospace;font-size:0.75rem;color:#CD7F32;margin-bottom:4px;">0</div>
          <div class="podium-bar" style="background:linear-gradient(180deg,#CD7F32,#a0522d);height:0;--h:80px;" id="bar3"></div>
        </div>
      </div>
      <div style="display:flex;gap:4px;height:20px;">
        <div style="flex:1;background:linear-gradient(180deg,#a8a8a8,#888);border-radius:0 0 6px 6px;"></div>
        <div style="flex:1;background:linear-gradient(180deg,#FF8C00,#d4730a);border-radius:0 0 6px 6px;"></div>
        <div style="flex:1;background:linear-gradient(180deg,#a0522d,#7a3e24);border-radius:0 0 6px 6px;"></div>
      </div>
    </div>

    <!-- Your Rank Badge -->
    <div class="fade-up" style="animation-delay:300ms; background:rgba(108,99,255,0.1);border:1.5px solid rgba(108,99,255,0.3);border-radius:16px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#6C63FF,#8B7FFF);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:#fff;animation:rankBadge 0.5s 0.5s ease both;">1</div>
        <div>
          <div style="font-size:0.85rem;font-weight:700;color:#fff;">You're #1! 🎉</div>
          <div style="font-size:0.7rem;color:rgba(255,255,255,0.4);">Leading by 240 XP</div>
        </div>
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;color:#6C63FF;" id="myXP">0 XP</div>
    </div>

    <!-- Rank List -->
    <div class="fade-up" style="animation-delay:400ms;">
      <div style="font-size:0.75rem;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">Full Rankings</div>
      <div id="rankList"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></div>
    <div class="nav-item"><span class="nav-icon">📖</span><span class="nav-label">Learn</span></div>
    <div class="nav-item"><span class="nav-icon">✏️</span><span class="nav-label">Test</span></div>
    <div class="nav-item active"><span class="nav-icon">🏆</span><span class="nav-label" style="color:#F5A623;">Ranks</span></div>
    <div class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></div>
  </div>
</div>

<script>
function countUp(el, target, duration, suffix='') {
  let start=0;
  const step=(ts)=>{ if(!start)start=ts; const p=Math.min((ts-start)/duration,1); el.textContent=Math.floor(p*target)+suffix; if(p<1)requestAnimationFrame(step); else el.textContent=target+suffix; };
  requestAnimationFrame(step);
}

const players = [
  {rank:1,name:'Aryan S.',avatar:'AS',color:'#6C63FF',score:2840,xp:2840,me:true},
  {rank:2,name:'Rahul K.',avatar:'RK',color:'#00C896',score:2600,xp:2600,me:false},
  {rank:3,name:'Priya M.',avatar:'PM',color:'#F5A623',score:2510,xp:2510,me:false},
  {rank:4,name:'Amit R.',avatar:'AR',color:'#FF5C35',score:2380,xp:2380,me:false},
  {rank:5,name:'Sara T.',avatar:'ST',color:'#6C63FF',score:2200,xp:2200,me:false},
  {rank:6,name:'Vikram P.',avatar:'VP',color:'#00C896',score:2100,xp:2100,me:false},
  {rank:7,name:'Neha G.',avatar:'NG',color:'#F5A623',score:1980,xp:1980,me:false},
  {rank:8,name:'Dev S.',avatar:'DS',color:'#6C63FF',score:1850,xp:1850,me:false},
];

const list = document.getElementById('rankList');
players.forEach((p,i)=>{
  const row = document.createElement('div');
  row.className='rank-row' + (p.me?' me':'');
  row.style.animationDelay=(400+i*80)+'ms';
  const medals = {1:'🥇',2:'🥈',3:'🥉'};
  row.innerHTML=`
    <div class="medal" style="background:${p.rank<=3?'rgba(245,166,35,0.15)':'rgba(255,255,255,0.05)'};color:${p.rank<=3?'#F5A623':'rgba(255,255,255,0.5)'};">${p.rank<=3?medals[p.rank]:p.rank}</div>
    <div class="avatar" style="width:38px;height:38px;background:linear-gradient(135deg,${p.color},${p.color}88);">${p.avatar}</div>
    <div style="flex:1;">
      <div style="font-size:0.85rem;font-weight:${p.me?'700':'600'};color:${p.me?'#fff':'rgba(255,255,255,0.85)'};">${p.name}${p.me?' <span style="font-size:0.65rem;background:rgba(108,99,255,0.3);color:#6C63FF;border-radius:10px;padding:1px 6px;margin-left:4px;">YOU</span>':''}</div>
      <div style="font-size:0.68rem;color:rgba(255,255,255,0.35);margin-top:1px;">Grade 5 · Section A</div>
    </div>
    <div style="text-align:right;">
      <div class="xp-val" style="font-family:'Space Mono',monospace;font-size:0.82rem;font-weight:700;color:${p.me?'#6C63FF':'rgba(255,255,255,0.6)'};" data-target="${p.xp}">0 XP</div>
      ${p.me?'<div style="font-size:0.65rem;color:rgba(0,200,150,0.7);">↑ 2 ranks</div>':''}
    </div>
  `;
  list.appendChild(row);
});

// Animate podium bars and count-ups
setTimeout(()=>{
  document.getElementById('bar1').style.height='140px';
  document.getElementById('bar2').style.height='100px';
  document.getElementById('bar3').style.height='80px';
  countUp(document.getElementById('xp1'),2840,1200,' XP');
  countUp(document.getElementById('xp2'),2600,1200,' XP');
  countUp(document.getElementById('xp3'),2510,1200,' XP');
  countUp(document.getElementById('myXP'),2840,1200,' XP');
  document.querySelectorAll('.xp-val').forEach(el=>{
    const t=parseInt(el.dataset.target);
    countUp(el,t,1000,' XP');
  });
},300);

function switchTab(el, tab) {
  document.querySelectorAll('.tab').forEach(t=>{t.className='tab inactive';});
  el.className='tab active';
}
</script>
</body>
</html>
