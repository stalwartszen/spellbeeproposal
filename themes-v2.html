*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* ════════════════════════════════════════
   VARIATION TOKENS
   ════════════════════════════════════════ */

/* A — SpellBee Classic */
body.var-a {
  --bg:            linear-gradient(155deg,#08061A 0%,#0D0B22 45%,#080616 100%);
  --surface:       rgba(20,18,52,0.85);
  --surface-border:rgba(108,99,255,0.22);
  --surface-shadow:0 28px 56px rgba(0,0,0,0.65),0 0 0 1px rgba(108,99,255,0.1);
  --accent:        #6C63FF;
  --accent-glow:   rgba(108,99,255,0.18);
  --accent-glow2:  rgba(0,200,150,0.09);
  --text:          rgba(255,255,255,0.92);
  --text2:         rgba(255,255,255,0.55);
  --text3:         rgba(255,255,255,0.28);
  --badge-bg:      rgba(108,99,255,0.15);
  --badge-border:  rgba(108,99,255,0.4);
  --badge-text:    #9B95FF;
  --card-bg:       rgba(255,255,255,0.04);
  --card-border:   rgba(255,255,255,0.08);
  --notch:         rgba(255,255,255,0.1);
  --screen-bg:     #0F0D2A;
  --tab-bg:        rgba(108,99,255,0.16);
  --tab-border:    rgba(108,99,255,0.45);
  --tab-text:      #9B95FF;
  --img-filter:    none;
  --divider:       rgba(255,255,255,0.06);
  --header-bg:     rgba(8,6,26,0.8);
}

/* B — Warm Earth */
body.var-b {
  --bg:            linear-gradient(155deg,#1C100A 0%,#241507 45%,#180D04 100%);
  --surface:       rgba(40,22,8,0.85);
  --surface-border:rgba(255,154,0,0.28);
  --surface-shadow:0 28px 56px rgba(0,0,0,0.65),0 0 0 1px rgba(255,154,0,0.1);
  --accent:        #FF9A00;
  --accent-glow:   rgba(255,154,0,0.15);
  --accent-glow2:  rgba(255,100,40,0.09);
  --text:          rgba(255,242,220,0.92);
  --text2:         rgba(255,218,170,0.6);
  --text3:         rgba(255,190,110,0.35);
  --badge-bg:      rgba(255,154,0,0.14);
  --badge-border:  rgba(255,154,0,0.42);
  --badge-text:    #FFB84D;
  --card-bg:       rgba(255,255,255,0.04);
  --card-border:   rgba(255,154,0,0.12);
  --notch:         rgba(255,154,0,0.15);
  --screen-bg:     #1A0D04;
  --tab-bg:        rgba(255,154,0,0.14);
  --tab-border:    rgba(255,154,0,0.45);
  --tab-text:      #FFB84D;
  --img-filter:    sepia(0.22) saturate(1.38) hue-rotate(-14deg) brightness(1.05);
  --divider:       rgba(255,154,0,0.1);
  --header-bg:     rgba(28,16,10,0.85);
}

/* C — Bold Red */
body.var-c {
  --bg:            linear-gradient(155deg,#1A0005 0%,#200008 45%,#150003 100%);
  --surface:       rgba(35,5,10,0.85);
  --surface-border:rgba(200,0,30,0.22);
  --surface-shadow:0 28px 56px rgba(0,0,0,0.65),0 0 0 1px rgba(200,0,30,0.08);
  --accent:        #C8001E;
  --accent-glow:   rgba(200,0,30,0.16);
  --accent-glow2:  rgba(255,80,40,0.08);
  --text:          rgba(255,240,240,0.92);
  --text2:         rgba(255,200,200,0.62);
  --text3:         rgba(255,160,160,0.32);
  --badge-bg:      rgba(200,0,30,0.15);
  --badge-border:  rgba(200,0,30,0.42);
  --badge-text:    #FF8080;
  --card-bg:       rgba(255,255,255,0.04);
  --card-border:   rgba(200,0,30,0.12);
  --notch:         rgba(200,0,30,0.14);
  --screen-bg:     #1A0005;
  --tab-bg:        rgba(200,0,30,0.15);
  --tab-border:    rgba(200,0,30,0.45);
  --tab-text:      #FF8080;
  --img-filter:    none;
  --divider:       rgba(200,0,30,0.1);
  --header-bg:     rgba(26,0,5,0.88);
}

/* ════════════════════════════════════════
   BASE
   ════════════════════════════════════════ */
body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  transition: background 0.55s cubic-bezier(.22,1,.36,1), color 0.4s ease;
}

/* HEADER */
#header {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; gap: 16px;
  padding: 0 32px; height: 58px;
  background: var(--header-bg);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--divider);
  transition: background 0.5s, border-color 0.5s;
}
.brand { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.brand-name { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; transition: color 0.4s; }
.brand-slash { color: var(--text3); font-size: 12px; margin: 0 2px; }
.brand-sub { font-size: 12px; color: var(--text3); transition: color 0.4s; }
.back-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: none; border: none; cursor: pointer;
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
  color: var(--text2); text-decoration: none; padding: 6px 0;
  transition: color 0.2s;
}
.back-btn:hover { color: var(--text); }
.sep { width: 1px; height: 18px; background: var(--divider); flex-shrink: 0; transition: background 0.4s; }
.spacer { flex: 1; }

/* VARIATION TABS */
.var-tabs {
  display: flex; gap: 4px; align-items: center;
  padding: 4px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
}
.var-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 15px; border-radius: 9px;
  border: 1px solid transparent;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 700; cursor: pointer;
  letter-spacing: 0.02em; white-space: nowrap;
  background: transparent; color: rgba(255,255,255,0.4);
  transition: all 0.25s ease;
}
.var-tab:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }
.var-tab.active { background: var(--tab-bg); border-color: var(--tab-border); color: var(--tab-text); }
.tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.proto-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.55);
  text-decoration: none; flex-shrink: 0; transition: all 0.2s;
}
.proto-link:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.88); border-color: rgba(255,255,255,0.2); }

/* HERO */
#hero {
  position: relative; overflow: hidden;
  padding: 56px 80px 44px;
  display: grid; grid-template-columns: 1fr 320px;
  gap: 48px; align-items: start;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(110px); pointer-events: none; z-index: 0;
  transition: background 0.6s ease;
}
#orb1 { width: 700px; height: 700px; background: var(--accent-glow); top: -300px; right: -180px; }
#orb2 { width: 450px; height: 450px; background: var(--accent-glow2); bottom: -150px; left: -100px; }
.giant-num {
  position: absolute; top: 16px; right: 74px;
  font-family: 'Syne', sans-serif;
  font-size: 14rem; font-weight: 800; line-height: 1; letter-spacing: -0.06em;
  color: var(--accent); opacity: 0.06;
  pointer-events: none; user-select: none; z-index: 0;
  transition: color 0.5s, opacity 0.5s;
}
.hero-left { position: relative; z-index: 2; }
.badge {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 13px; border-radius: 20px;
  background: var(--badge-bg); border: 1px solid var(--badge-border);
  color: var(--badge-text);
  font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
  margin-bottom: 18px; transition: background 0.4s, border-color 0.4s, color 0.4s;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.hero-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.6rem,4.2vw,4rem); font-weight: 800;
  line-height: 1.06; letter-spacing: -0.03em;
  color: var(--text); transition: color 0.4s; margin-bottom: 16px;
}
.accent-word { color: var(--accent); transition: color 0.4s; }
.hero-desc {
  font-size: 0.93rem; line-height: 1.85;
  color: var(--text2); max-width: 520px; transition: color 0.4s;
}

/* PALETTE */
.palette { display: flex; gap: 10px; align-items: flex-end; margin-top: 28px; }
.swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: default; }
.swatch-circle {
  width: 34px; height: 34px; border-radius: 50%;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  transition: transform 0.22s ease, box-shadow 0.22s;
}
.swatch:hover .swatch-circle { transform: scale(1.18) translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.45); }
.swatch-hex { font-family: 'Space Mono', monospace; font-size: 8px; font-weight: 700; color: var(--text3); letter-spacing: 0.04em; transition: color 0.4s; }
.swatch-name { font-size: 9px; font-weight: 600; color: var(--text3); text-align: center; line-height: 1.3; transition: color 0.4s; }

/* NOTES */
.notes { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 28px; }
.note {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 14px; padding: 16px 18px;
  transition: background 0.4s, border-color 0.4s;
}
.note-icon { font-size: 20px; margin-bottom: 9px; display: block; }
.note-title { font-size: 11.5px; font-weight: 700; color: var(--text); margin-bottom: 5px; transition: color 0.4s; }
.note-body { font-size: 10.5px; line-height: 1.7; color: var(--text2); transition: color 0.4s; }

/* TYPE CARD */
.hero-right { position: relative; z-index: 2; }
.type-card {
  background: var(--surface); border: 1px solid var(--surface-border);
  border-radius: 18px; padding: 22px 24px;
  box-shadow: var(--surface-shadow);
  transition: background 0.5s, border-color 0.5s, box-shadow 0.5s;
}
.type-label { font-size: 9px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; transition: color 0.4s; }
#type-sample { font-size: 3.6rem; font-weight: 800; line-height: 1; letter-spacing: -0.03em; color: var(--accent); margin-bottom: 12px; transition: color 0.5s; }
.type-info { border-top: 1px solid var(--divider); padding-top: 14px; margin-top: 4px; }
#type-name { font-size: 12px; font-weight: 700; color: var(--text); transition: color 0.4s; }
#type-desc { font-size: 10.5px; color: var(--text2); margin-top: 3px; transition: color 0.4s; }
.tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
.tag {
  padding: 4px 10px; border-radius: 6px;
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em;
  background: var(--card-bg); border: 1px solid var(--card-border);
  color: var(--text2); transition: background 0.4s, border-color 0.4s, color 0.4s;
}
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.stat-item { text-align: center; }
.stat-num { font-family: 'Space Mono', monospace; font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1; transition: color 0.4s; }
.stat-lbl { font-size: 9px; color: var(--text3); margin-top: 3px; transition: color 0.4s; }

/* SCREENS */
/* showcase image row */
.showcase-section { padding: 0 80px 48px; position: relative; z-index: 2; }
.section-label { font-size: 9.5px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text3); margin-bottom: 22px; transition: color 0.4s; }
.screens-row {
  display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
  padding-bottom: 8px;
}
.showcase-img {
  max-width: 100%; height: auto; display: block;
  border-radius: 18px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 4px 16px rgba(0,0,0,0.3);
  border: 1px solid var(--surface-border);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.showcase-img:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: 0 28px 72px rgba(0,0,0,0.65), 0 6px 20px rgba(0,0,0,0.35);
}
/* ── iPhone mockup ─────────────────────────────
   Outer shell: 100px wide
   Inner screen: 86px wide
   Scale = 86 / 390 = 0.2205
   Screen height = 844 × 0.2205 ≈ 186px
   Total shell height ≈ 211px
   ─────────────────────────────────────────── */
.phone-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  flex-shrink: 0; position: relative;
}

/* Outer titanium shell */
.iphone {
  width: 100px;
  height: 211px;
  border-radius: 22px;
  position: relative;
  flex-shrink: 0;
  background: linear-gradient(160deg,#3a3a3c 0%,#1c1c1e 40%,#2c2c2e 100%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.14),
    0 0 0 2px #111113,
    0 0 0 3px rgba(255,255,255,0.08),
    0 16px 36px rgba(0,0,0,0.72),
    0 5px 12px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.18);
  transition: box-shadow 0.5s, transform 0.3s;
}
.iphone:hover { transform: translateY(-3px) scale(1.02); }

/* Side buttons — left: silent + volume */
.iphone::before {
  content: '';
  position: absolute;
  left: -2.5px; top: 44px;
  width: 2.5px; height: 15px;
  background: linear-gradient(180deg,#3a3a3c,#2a2a2c);
  border-radius: 2px 0 0 2px;
  box-shadow: 0 19px 0 #333335, 0 35px 0 #333335, -1px 0 0 rgba(255,255,255,0.1);
}
/* Right: power button */
.iphone::after {
  content: '';
  position: absolute;
  right: -2.5px; top: 60px;
  width: 2.5px; height: 28px;
  background: linear-gradient(180deg,#3a3a3c,#2a2a2c);
  border-radius: 0 2px 2px 0;
  box-shadow: -1px 0 0 rgba(0,0,0,0.4);
}

/* Screen glass area */
.iphone-glass {
  position: absolute;
  inset: 3px;
  border-radius: 20px;
  overflow: hidden;
  background: #000;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
}

/* Actual app screen (clipped to glass) */
.iphone-screen {
  position: absolute;
  top: 7px; left: 4px;
  width: 86px; height: 186px;
  border-radius: 17px;
  overflow: hidden;
  background: #000;
}
.iphone-screen iframe {
  width: 390px; height: 844px;
  border: none; display: block;
  pointer-events: none;
  transform: scale(0.2205);
  transform-origin: top left;
}

/* Dynamic Island */
.dynamic-island {
  position: absolute;
  top: 9px; left: 50%; transform: translateX(-50%);
  width: 26px; height: 6px;
  background: #000;
  border-radius: 5px;
  z-index: 10;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
}

/* Home indicator bar */
.home-bar {
  position: absolute;
  bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 28px; height: 2px;
  background: rgba(255,255,255,0.35);
  border-radius: 3px;
  z-index: 10;
}

/* Screen label below phone */
.screen-name { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-align: center; transition: color 0.4s; }
.screen-sub { font-size: 9px; color: var(--text3); text-align: center; margin-top: 2px; transition: color 0.4s; }

/* DIVIDER */
.divider { height: 1px; background: var(--divider); margin: 0 80px 40px; transition: background 0.4s; }

/* FADE */
.fade-target { transition: opacity 0.32s ease; }
.switching .fade-target { opacity: 0; }

/* FOOTER */
.page-footer {
  padding: 20px 80px 36px;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-text { font-size: 10px; color: var(--text3); letter-spacing: 0.04em; transition: color 0.4s; }
.footer-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; color: var(--badge-text);
  text-decoration: none; letter-spacing: 0.04em; opacity: 0.8; transition: opacity 0.2s;
}
.footer-link:hover { opacity: 1; }

/* RESPONSIVE */
@media (max-width: 900px) {
  #hero { grid-template-columns: 1fr; padding: 40px 24px 32px; }
  .hero-right { display: none; }
  .giant-num { font-size: 8rem; right: 16px; opacity: 0.05; }
  .notes { grid-template-columns: 1fr; }
  .showcase-section { padding: 0 24px 40px; }
  .divider { margin: 0 24px 32px; }
  .page-footer { padding: 16px 24px 28px; flex-direction: column; gap: 8px; text-align: center; }
  #header { padding: 0 16px; }
  .brand-sub { display: none; }
}
@media (max-width: 600px) {
  .var-tab { padding: 6px 10px; }
  .var-tab .tab-label { display: none; }
}
</style>

var activeVar = 'a';

/* ── Showcase screenshot images per variation ── */
var SHOWCASE_IMAGES = {
  a: ['newassets/Screenshot 2026-04-25 190647.png'],
  b: ['newassets/Screenshot 2026-04-25 190622.png'],
  c: [
    'newassets/Screenshot 2026-04-25 225804.png',
    'newassets/Screenshot 2026-04-25 225838.png',
  ],
};

function buildScreens(v) {
  var row = document.getElementById('screens-row');
  row.textContent = '';
  var imgs = SHOWCASE_IMAGES[v];
  var maxW = imgs.length > 1 ? '430px' : '600px';

  imgs.forEach(function(src) {
    var img = document.createElement('img');
    img.src = src;
    img.alt = 'Design variation preview';
    img.className = 'showcase-img';
    img.style.maxWidth = maxW;
    img.style.width = '100%';
    row.appendChild(img);
  });
}

/* ── Render palette ─────────────────────────── */
function buildPalette(items) {
  var el = document.getElementById('palette');
  el.textContent = '';
  items.forEach(function(s) {
    var sw = document.createElement('div');
    sw.className = 'swatch';

    var circle = document.createElement('div');
    circle.className = 'swatch-circle';
    circle.style.background = s.color;

    var nm = document.createElement('div');
    nm.className = 'swatch-name';
    nm.textContent = s.name;

    var hex = document.createElement('div');
    hex.className = 'swatch-hex';
    hex.textContent = s.color;

    sw.appendChild(circle);
    sw.appendChild(nm);
    sw.appendChild(hex);
    el.appendChild(sw);
  });
}

/* ── Render notes ───────────────────────────── */
function buildNotes(items) {
  var el = document.getElementById('notes');
  el.textContent = '';
  items.forEach(function(n) {
    var card = document.createElement('div');
    card.className = 'note';

    var icon = document.createElement('span');
    icon.className = 'note-icon';
    icon.textContent = n.icon;

    var title = document.createElement('div');
    title.className = 'note-title';
    title.textContent = n.title;

    var body = document.createElement('div');
    body.className = 'note-body';
    body.textContent = n.body;

    card.appendChild(icon);
    card.appendChild(title);
    card.appendChild(body);
    el.appendChild(card);
  });
}

/* ── Render tags ────────────────────────────── */
function buildTags(tags) {
  var el = document.getElementById('tag-row');
  el.textContent = '';
  tags.forEach(function(t) {
    var tag = document.createElement('div');
    tag.className = 'tag';
    tag.textContent = t;
    el.appendChild(tag);
  });
}

/* ── Render stats ───────────────────────────── */
function buildStats(stats) {
  var el = document.getElementById('stat-row');
  el.textContent = '';
  stats.forEach(function(s) {
    var item = document.createElement('div');
    item.className = 'stat-item';

    var num = document.createElement('div');
    num.className = 'stat-num';
    num.textContent = s.n;

    var lbl = document.createElement('div');
    lbl.className = 'stat-lbl';
    lbl.textContent = s.l;

    item.appendChild(num);
    item.appendChild(lbl);
    el.appendChild(item);
  });
}

/* ── Apply content for variation ────────────── */
function applyContent(v) {
  var V = VARS[v];

  document.getElementById('giant-num').textContent = V.num;
  document.getElementById('badge-text').textContent = V.badge;
  document.getElementById('hero-desc').textContent = V.desc;
  document.getElementById('type-name').textContent = V.typeName;
  document.getElementById('type-desc').textContent = V.typeDesc;

  /* Title: plain text + accent span */
  var titleEl = document.getElementById('hero-title');
  titleEl.textContent = '';
  var textNode = document.createTextNode(V.titleParts[0]);
  var accentSpan = document.createElement('span');
  accentSpan.className = 'accent-word';
  accentSpan.textContent = V.titleParts[1];
  titleEl.appendChild(textNode);
  titleEl.appendChild(accentSpan);

  /* Type sample */
  var sampleEl = document.getElementById('type-sample');
  sampleEl.textContent = 'Abc';
  sampleEl.style.fontFamily = V.typeFont;

  buildPalette(V.palette);
  buildNotes(V.notes);
  buildTags(V.tags);
  buildStats(V.stats);
}

/* ── Switch variation ───────────────────────── */
function setVariation(v) {
  if (v === activeVar) return;

  var fadeEls = document.querySelectorAll('.fade-target');
  fadeEls.forEach(function(el) { el.style.opacity = '0'; });

  setTimeout(function() {
    activeVar = v;
    document.body.className = 'var-' + v;

    ['a','b','c'].forEach(function(id) {
      var tab = document.getElementById('tab-' + id);
      if (id === v) tab.classList.add('active');
      else tab.classList.remove('active');
    });

    applyContent(v);
    buildScreens(v);

    fadeEls.forEach(function(el) { el.style.opacity = ''; });
  }, 300);
}

/* ── Tab click wiring ───────────────────────── */
document.getElementById('var-tabs').addEventListener('click', function(e) {
  var btn = e.target.closest('.var-tab');
  if (btn) setVariation(btn.dataset.var);
});

buildScreens('a');
applyContent('a');
